// ── Color scheme ──────────────────────────────────────────────────────────────
// Hard = legislative action (co-sponsored bill / on-record vote)

function dotColor(m) {

}


function antiArmsTag(m) {

}


function antiArmsTagColor(m) {
  if (!m.antiArms) return "#374151";
  if (m.party === "R") return "#e879f9";
  if (m.party === "I") return "#a3e635";

}


function computeHemicycle(allMembers, chamber, cx, cy) {
  // Fixed parliamentary row seat counts — tested layout
  const ch        = chamber === "senate" ? "senate" : "house";
  const rowCounts = ch === "senate" ? [34, 33, 33] : [80, 80, 90, 90, 95];
  const innerR    = ch === "senate" ? 60 : 36;
  const spacing   = ch === "senate" ? 22 : 18;
  const totalSeats = rowCounts.reduce((s, c) => s + c, 0);

  // Filter to active members in this chamber
  const active = allMembers.filter(m =>
    m.chamber === ch &&
    !["RETIRED","RESIGNED","DEFEATED","RETIRING","FAILED_PRIMARY"].includes(m.ps)
  );

  // Order: R bloc | anti-R | anti-D | D bloc | I  (left → right)
  const antiR = active.filter(m => m.antiArms && m.party === "R");
  const antiD = active.filter(m => m.antiArms && m.party !== "R");
  const restR = active.filter(m => !m.antiArms && m.party === "R");
  const restD = active.filter(m => !m.antiArms && m.party === "D");
  const restI = active.filter(m => !m.antiArms && m.party === "I");
  const restU = active.filter(m => !m.antiArms && m.party !== "R" && m.party !== "D" && m.party !== "I");
  const ordered = [...restR, ...antiR, ...antiD, ...restD, ...restI, ...restU];

  // Pad to totalSeats with fillers
  while (ordered.length < totalSeats) ordered.push({_filler:true, antiArms:false, party:"", chamber:ch});

  // Place seats row by row, inner→outer, left→right within each row
  const result = [];
  let idx = 0;
  rowCounts.forEach((count, ri) => {
    const r = innerR + ri * spacing;
    for (let s = 0; s < count; s++, idx++) {
      const m     = ordered[idx] || {_filler:true};
      const angle = count === 1 ? Math.PI / 2 : (Math.PI / (count - 1)) * s;
      result.push({
        ...m,
        _x: cx - r * Math.cos(angle),
        _y: cy - r * Math.sin(angle),
      });
    }
  });
  return result;
}







function fmtM(n) {
  if (!n&&n!==0) return "—";
  if (n>=1e6) return "$"+(n/1e6).toFixed(1)+"M";
  if (n>=1e3) return "$"+Math.round(n/1e3)+"K";
  return "$"+n;
}
function StatusBadge({ps}) {
  const MAP = {

}

function ProgressBars({chamber, members, allMembers, racesData, polyData}) {
  const current = members.filter(m => m.antiArms).length;

  // ── Probability model (Poisson-binomial normal approximation) ──────────
  const races  = (racesData && racesData.length > 0) ? racesData : KEY_RACES_2026;
  const ch     = chamber;

  const trials = [];
  members.filter(m => m.antiArms).forEach(m => {
    const race    = races.find(r => r.name === m.name && r.chamber === ch);
    const polyMkt = polyData && polyData[m.name];
    let   p;
    if (polyMkt && polyMkt.prob != null)      p = polyMkt.prob;
    else if (race && race.win_prob != null)    p = race.win_prob;
    else if (race && race.winProb != null)     p = race.winProb;
    else if (race && race.departing)           p = 0;
    else                                       p = 0.88;
    trials.push({name: m.name, p});
  });
  races
    .filter(r => r.chamber === ch && (r.type === "challenger" || r.raceType === "CHALLENGER"))
    .forEach(r => {
      const pm = polyData && polyData[r.name];
      const p  = pm && pm.prob != null ? pm.prob : r.win_prob != null ? r.win_prob : 0.20;
      trials.push({name: r.name, p});
    });

  const mu     = trials.reduce((s, t) => s + t.p, 0);
  const sigma2 = trials.reduce((s, t) => s + t.p * (1 - t.p), 0);
  const sigma  = Math.sqrt(Math.max(sigma2, 0.01));
  const polyCount = trials.filter(t => {
    const pm = polyData && polyData[t.name];
    return pm && pm.prob != null;
  }).length;

  function normCDF(z) {
    if (z > 6) return 1; if (z < -6) return 0;
    const t = 1 / (1 + 0.2315419 * Math.abs(z));
    const d = 0.3989423 * Math.exp(-z * z / 2);
    const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.7814779 + t * (-1.8212560 + t * 1.3302744))));
    return z > 0 ? 1 - p : p;
  }
  function pReach(n) {
    return Math.max(0, Math.min(1, normCDF(-(n - 0.5 - mu) / sigma)));
  }
  function probColor(p) {
    if (p >= 0.7)  return "#4ade80";
    if (p >= 0.4)  return "#fbbf24";
    if (p >= 0.15) return "#f97316";
    return "#f87171";
  }
  function probLabel(p) {
    if (p >= 0.85) return "Very Likely";
    if (p >= 0.65) return "Likely";
    if (p >= 0.40) return "Possible";
    if (p >= 0.15) return "Unlikely";
    return "Very Unlikely";
  }

  return html`
    <div style=${{background:"#0f1117",border:"1px solid #1e2230",borderRadius:12,padding:"12px 14px",width:"100%",boxSizing:"border-box"}}>
      <div style=${{fontSize:9,color:"#a78bfa",fontFamily:"monospace",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:7}}>
        ◈ Anti-Intervention Coalition · ${chamber === "senate" ? "Senate" : "House"}
      </div>

      <div style=${{display:"flex",gap:8,marginBottom:7,flexWrap:"wrap",alignItems:"center",fontFamily:"monospace",fontSize:8}}>
        <span style=${{display:"flex",alignItems:"center",gap:4}}>
          <span style=${{width:9,height:9,borderRadius:2,background:"#818cf8",display:"inline-block"}}/>
          <span style=${{color:"#818cf8",fontWeight:600}}>${current} Anti-Intervention</span>
        </span>
        <span style=${{color:"#4b5563"}}>·</span>
        <span style=${{color:"#374151"}}>Expected by Nov 2026:
          <span style=${{color:"#a5b4fc",fontWeight:600}}> μ=${mu.toFixed(1)}</span>
          <span style=${{color:"#374151"}}> ± ${sigma.toFixed(1)}</span>
        </span>
        ${polyCount > 0 ? html`<span style=${{color:"#4ade80",fontSize:7}}>◉ ${polyCount} live</span>` : null}
      </div>

      ${THRESHOLDS[chamber].map((th, i) => {
        const pct     = Math.min(100, Math.round((current / th.n) * 100));
        const reached = current >= th.n;
        const prob    = pReach(th.n);
        const pc      = probColor(prob);
        const pl      = probLabel(prob);
        const need    = Math.max(0, th.n - current);
        const muPct   = Math.min(99, Math.round((mu / th.n) * 100));

        return html`
          <div key=${i} style=${{marginBottom: i < THRESHOLDS[chamber].length - 1 ? 16 : 0}}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3,flexWrap:"wrap",gap:3}}>
              <span style=${{fontSize:10,color:reached?"#4ade80":th.color,fontWeight:600,fontFamily:"monospace"}}>
                ${th.label}
                <span style=${{fontSize:9,fontWeight:400,color:"#374151"}}> / ${th.n}</span>
              </span>
              <div style=${{display:"flex",gap:5,alignItems:"center"}}>
                <span style=${{fontSize:9,fontFamily:"monospace",color:reached?"#4ade80":"#6b7280"}}>
                  ${current}/${th.n}${reached ? " ✓" : ""}
                </span>
                <span style=${{
                  fontSize:9,fontFamily:"monospace",fontWeight:700,
                  padding:"1px 7px",borderRadius:4,
                  background:pc+"18",color:pc,border:"1px solid "+pc+"40",
                  minWidth:44,textAlign:"center",
                }}>
                  ${reached ? "100%" : Math.round(prob*100)+"%"}
                </span>
              </div>
            </div>

            <div style=${{height:7,borderRadius:4,background:"#1a1d27",overflow:"hidden",marginBottom:4,position:"relative"}}>
              <div style=${{position:"absolute",left:0,top:0,height:"100%",
                width:pct+"%",background:reached?"#4ade80":"#818cf8",
                borderRadius:4,transition:"width 0.8s ease"}}/>
              ${!reached ? html`
                <div style=${{position:"absolute",top:0,height:"100%",width:2,
                  background:"#a5b4fc",opacity:0.5,left:muPct+"%"}}/>` : null}
            </div>

            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:3}}>
              <div style=${{fontSize:8,fontFamily:"monospace",color:pc,flex:1}}>
                ${reached
                  ? "✓ Threshold reached with current coalition"
                  : pl + " by Nov 2026 — need " + need + " more (μ=" + mu.toFixed(1) + ", σ=" + sigma.toFixed(1) + ")"}
              </div>
            </div>
            <div style=${{fontSize:9,color:"#374151",lineHeight:1.5,marginTop:2}}>${th.desc}</div>
          </div>`;
      })}

      <div style=${{marginTop:10,paddingTop:7,borderTop:"1px solid #1a1d27",
        fontSize:7,color:"#1e2230",fontFamily:"monospace",lineHeight:1.7}}>
        P(reach N) = Φ((μ−N+0.5)/σ). Win probs: Polymarket live → race data → 0.88 default retention.
      </div>
    </div>`;
}


function BillsPanel({bills}) {

  return html`

        <div style=${{fontSize:8,color:"#374151",marginTop:2}}>${anti.length} arms-restricting · ${pro.length} arms-authorizing · refreshed from api.congress.gov</div>
      </div>
      ${anti.length>0?html`
        <div style=${{padding:"3px 9px",background:"#0a0c10",fontSize:8,color:"#374151",fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>Anti-Intervention Legislation</div>
        ${anti.map((b,i)=>html`<${BillRow} key=${i} b=${b}/>`)}`:null}
      ${pro.length>0?html`
        <div style=${{padding:"3px 9px",background:"#0a0c10",fontSize:8,color:"#374151",fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>Pro-Arms (tracked for No votes)</div>
        ${pro.map((b,i)=>html`<${BillRow} key=${i} b=${b}/>`)}`:null}
    </div>`;
}
function MemberBox({title, color, members, challengers, fecData, polyData, onSelect}) {
  const [tab, setTab] = useState("members");

  const active   = members.filter(m => !["RETIRED","RESIGNED","DEFEATED","RETIRING","FLIPPED"].includes(m.ps));
  const departed = members.filter(m => ["RETIRED","RESIGNED","DEFEATED","FLIPPED","RETIRING"].includes(m.ps));

  const groups = {
    RECOUNT:  challengers.filter(c=>c.ps==="RECOUNT"),
    PENDING:  challengers.filter(c=>c.ps==="RESULTS_PENDING"),
    RUNOFF:   challengers.filter(c=>c.ps==="RUNOFF"),
    WON:      challengers.filter(c=>c.ps==="WON"),
    UPCOMING: challengers.filter(c=>c.ps==="UPCOMING"||c.ps==="GENERAL"),
    DEFEATED: challengers.filter(c=>c.ps==="DEFEATED"),
  };

  const Row = ({m, isChallenger}) => {
    const fec  = fecData[m.name];
    const poly = polyData[m.name];
    const loc  = m.state+(m.district!=null?"-"+m.district:m.chamber==="senate"?" · S":"");
    return html`

        onMouseLeave=${e=>{e.currentTarget.style.background="transparent";}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:4,marginBottom:2}}>
          <span style=${{fontSize:11,color:"#e8e4dc",fontWeight:600,lineHeight:1.2,flex:1}}>${m.name}</span>
          <${StatusBadge} ps=${m.ps||"INCUMBENT"} prob=${poly?.prob}/>
        </div>
        <div style=${{display:"flex",gap:5,flexWrap:"wrap",marginBottom:2}}>
          <span style=${{fontSize:8,fontFamily:"monospace",color:"#374151"}}>${loc}${isChallenger&&m.primaryDate?" · "+m.primaryDate:""}</span>
          ${!isChallenger?html`<${ArmsBadge} member=${m}/>`:null}
        </div>
        ${m.note?html`<div style=${{fontSize:8,color:"#374151",lineHeight:1.3,marginBottom:2}}>${m.note.slice(0,70)}${m.note.length>70?"…":""}</div>`:null}
        ${m.rlc_score?html`<span style=${{fontSize:8,fontFamily:"monospace",color:"#fbbf24",opacity:.7}}>RLC ${m.rlc_score}/100</span>`:null}
        ${fec?html`
          <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
            ${fec.raised!=null?html`<span style=${{fontSize:8,fontFamily:"monospace",color:"#4b5563"}}>↑${fmtM(fec.raised)}</span>`:null}
            ${fec.ie_against>0?html`<span style=${{fontSize:8,fontFamily:"monospace",color:"#f87171"}}>⚡${fmtM(fec.ie_against)} vs</span>`:null}
          </div>`:null}
      </div>`;
  };

  const Section = ({label, items, isChallenger}) => {
    if (!items||!items.length) return null;
    return html`<${Fragment}>
      ${label?html`<div style=${{padding:"3px 9px",background:"#090b0e",fontSize:8,color:"#374151",fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>${label}</div>`:null}
      ${items.map((m,i)=>html`<${Row} key=${i} m=${m} isChallenger=${isChallenger}/>`)}
    </${Fragment}>`;
  };

  return html`
    <div class="side-box" style=${{width:222,background:"#0f1117",border:"1px solid "+color+"22",borderRadius:12,overflow:"hidden",flexShrink:0}}>
      <div style=${{background:"linear-gradient(135deg,"+color+"16,"+color+"05)",borderBottom:"1px solid "+color+"22",padding:"9px 11px"}}>
        <div style=${{fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color,fontFamily:"monospace"}}>${title}</div>
        <div style=${{fontSize:8,color:"#374151",marginTop:2}}>
          ${active.length} active · ${departed.length} departed · ${challengers.length} challengers
        </div>
      </div>
      <div style=${{display:"flex",borderBottom:"1px solid #0e1016"}}>
        ${[["members","Members"],["challengers","Challengers"]].map(([k,l])=>html`
          <button key=${k} onClick=${()=>setTab(k)} style=${{

function useData() {

  const [polyUpdated,  setPolyUpd]   = useState(null);
  const [polyLoading,  setPolyLoad]  = useState(false);

  // ── Helpers ──────────────────────────────────────────────────────────────

  const GAMMA = "https://gamma-api.polymarket.com";
  const CLOB  = "https://clob.polymarket.com";

  function safeFloat(v) {

  }

  // Extract YES token_id from a Gamma market object
  function extractYesToken(mk) {
    const tokens = mk.tokens || mk.clobTokenIds || [];
    let yes = null, no = null;
    for (const tok of tokens) {
      if (tok && typeof tok === "object") {
        const out = (tok.outcome || "").toUpperCase();
        const tid = tok.token_id || tok.tokenId || "";
        if (out === "YES") yes = tid;
        if (out === "NO")  no  = tid;
      } else if (typeof tok === "string") {
        if (!yes) yes = tok;
        else if (!no) no = tok;
      }
    }
    return {yes, no};
  }

  // ── Batch CLOB refresh (fast: 1 request for all known tokens) ────────────
  async function batchRefreshCLOB(basePolyData) {
    // Collect all YES token_ids from the data.json snapshot
    const tokenMap = {};  // token_id → candidate name
    for (const [name, pd] of Object.entries(basePolyData)) {
      if (pd.token_id) tokenMap[pd.token_id] = name;
    }
    const tokenIds = Object.keys(tokenMap);
    if (tokenIds.length === 0) return {};

    // CLOB batch midpoints endpoint — GET with comma-separated token_ids
    // Falls back to individual calls if batch fails
    const fresh = {};
    try {
      // Try batch GET (up to 500 ids)
      const qs = tokenIds.map(id => "token_ids=" + encodeURIComponent(id)).join("&");
      const r  = await fetch(CLOB + "/midpoints?" + qs);
      if (r.ok) {
        const data = await r.json();
        // Response: [{token_id, mid}, ...] or {results: [...]}
        const items = Array.isArray(data) ? data : (data.results || data.midpoints || []);
        for (const item of items) {
          const tid  = item.token_id || item.tokenId;
          const mid  = safeFloat(item.mid || item.price);
          const name = tokenMap[tid];
          if (name && mid !== null && mid >= 0 && mid <= 1) {
            fresh[name] = {
              ...basePolyData[name],
              prob:       mid,
              src:        "polymarket_live",
              fetched_at: new Date().toISOString(),
            };
          }
        }
        if (Object.keys(fresh).length > 0) {
          console.log("Poly batch CLOB: " + Object.keys(fresh).length + "/" + tokenIds.length + " refreshed");
          return fresh;
        }
      }
    } catch (e) {
      console.warn("Poly batch failed, falling back to individual:", e);
    }

    // Fallback: individual CLOB calls (in parallel, max 8 at once)
    const chunkSize = 8;
    for (let i = 0; i < tokenIds.length; i += chunkSize) {
      const chunk = tokenIds.slice(i, i + chunkSize);
      await Promise.all(chunk.map(async tid => {
        try {
          const r = await fetch(CLOB + "/midpoint?token_id=" + encodeURIComponent(tid));
          if (!r.ok) return;
          const d   = await r.json();
          const mid = safeFloat(d.mid || d.price);
          const name = tokenMap[tid];
          if (name && mid !== null && mid >= 0 && mid <= 1) {
            fresh[name] = {
              ...basePolyData[name],
              prob:       mid,
              src:        "polymarket_live",
              fetched_at: new Date().toISOString(),
            };
          }
        } catch {}
      }));
      if (i + chunkSize < tokenIds.length) {
        await new Promise(r => setTimeout(r, 100));
      }
    }
    console.log("Poly individual CLOB: " + Object.keys(fresh).length + " refreshed");
    return fresh;

    const fresh = {};
    for (const name of missing) {
      const last = name.split(" ").pop().toLowerCase();
      let mk = catalog[last];

      if (!mk) {
        // Individual search
        for (const q of [name, last + " 2026", last + " congress"]) {
          try {
            const r = await fetch(GAMMA + "/markets?q=" + encodeURIComponent(q) + "&limit=8");
            if (!r.ok) continue;
            const data = await r.json();
            const items = Array.isArray(data) ? data : (data.markets || []);
            mk = items.find(m => {
              const t = (m.question || m.title || "").toLowerCase();
              return t.includes(last) && /win|elect|primary|congress|senate|house|general/i.test(t);
            });
            if (mk) break;
          } catch {}
          await new Promise(r => setTimeout(r, 250));
        }
      }

      if (!mk) continue;

      const {yes, no} = extractYesToken(mk);
      let prob = null, src = "polymarket_gamma";

      if (yes) {
        try {
          const r = await fetch(CLOB + "/midpoint?token_id=" + encodeURIComponent(yes));
          if (r.ok) {
            const d = await r.json();
            const mid = safeFloat(d.mid);
            if (mid !== null) { prob = mid; src = "polymarket_live"; }
          }
        } catch {}
      }

      // Fallback: Gamma lastTradePrice / outcomePrices
      if (prob === null) {
        const ltp = mk.lastTradePrice || mk.last_trade_price;
        if (ltp != null) { prob = safeFloat(ltp); }
        else {
          const op = mk.outcomePrices;
          if (op) {
            try {
              const arr = typeof op === "string" ? JSON.parse(op) : op;
              if (arr && arr.length > 0) prob = safeFloat(arr[0]);
            } catch {}
          }
        }
      }

      if (prob !== null && prob >= 0 && prob <= 1) {
        const slug = mk.slug || "";
        fresh[name] = {
          prob,
          src,
          question:     mk.question || mk.title || "",
          condition_id: mk.conditionId || "",
          token_id:     yes || "",
          no_token_id:  no  || "",
          slug,
          volume:       safeFloat(mk.volume) || 0,
          url:          slug ? "https://polymarket.com/event/" + slug : "https://polymarket.com",
          fetched_at:   new Date().toISOString(),
        };
      }
      await new Promise(r => setTimeout(r, 300));
    }

    if (Object.keys(fresh).length > 0) {
      console.log("Poly Gamma new: " + Object.keys(fresh).length + " candidates found");
    }
    return fresh;
  }

  // ── Full poly refresh cycle ───────────────────────────────────────────────
  async function refreshPoly(memberList, racesList, basePolyData) {
    setPolyLoad(true);
    try {
      // Step 1: fast batch refresh for known tokens
      const batchFresh = await batchRefreshCLOB(basePolyData);

      // Step 2: Gamma search for new candidates
      const merged = {...basePolyData, ...batchFresh};
      const newFresh = await searchGammaForNew(memberList, racesList, merged);

      const allFresh = {...batchFresh, ...newFresh};
      if (Object.keys(allFresh).length > 0) {
        setPolyLive(prev => ({...prev, ...allFresh}));
        setPolyUpd(new Date().toISOString());
        // Update polyBase if we found new token_ids
        const newTokens = Object.entries(newFresh).filter(([,v]) => v.token_id);
        if (newTokens.length > 0) {
          setPolyBase(prev => {
            const updated = {...prev};
            newTokens.forEach(([k,v]) => { updated[k] = v; });
            return updated;
          });
        }
      }
    } catch (e) {
      console.warn("refreshPoly error:", e);
    }
    setPolyLoad(false);
  }

  // ── Load data.json ────────────────────────────────────────────────────────
  useEffect(() => {
    fetch(HISTORY_URL + "?_=" + Date.now()).then(r => r.json()).then(d => {
      if (d.events) setHistory(d);
    }).catch(() => {});

    (async () => {
      try {
        const r = await fetch(DATA_URL + "?_=" + Date.now());
        if (!r.ok) throw new Error("HTTP " + r.status);
        const d = await r.json();

        let memberList = d.members || [];
        if (memberList.length === 0 && d.trackaipac_congress) {
          memberList = Object.values(d.trackaipac_congress)
            .filter(m => m.name && m.name.toLowerCase() !== "vacant" && m.name.length > 2)
            .map(m => ({
              bioguide_id: "", name: m.name, party: m.party || "?",
              state: m.state || "", district: m.district != null ? m.district : null,
              chamber: m.chamber || "house",
              antiArms: !!(m.antiArms || m.approved),
              antiArmsLevel: null,
              ps: "INCUMBENT", bills: [], votes: [],
              lobby_total: m.lobby_total || 0, pacs: m.pacs || [], note: m.note || "",
            }));
        }
        const KNOWN_ANTI_INTERVENTION = {
          "Thomas Massie":    {reason:"Co-sponsored HR 3565; consistent No votes on Israel arms"},
          "Warren Davidson":  {reason:"Voted No on HR 8034 (Israel aid supplemental, Apr 2024)"},
          "Andy Biggs":       {reason:"Voted No on HR 8034 and HR 8035 (Israel/Ukraine aid, Apr 2024)"},
          "Scott Perry":      {reason:"Voted No on HR 8034 (Israel aid supplemental, Apr 2024)"},
          "Paul Gosar":       {reason:"Voted No on HR 8034 (Israel aid supplemental, Apr 2024)"},
          "Chip Roy":         {reason:"Voted No on HR 8034 (Israel aid supplemental, Apr 2024)"},
          "Thomas Tiffany":   {reason:"Voted No on HR 8034 (Israel aid supplemental, Apr 2024)"},
          "Rand Paul":        {reason:"Led Senate holds on Israel arms sales; co-sponsored FMS disapproval resolutions"},
          "Lauren Boebert":   {reason:"Voted No on HR 8034; positions have shifted"},
          "Barry Moore":      {reason:"Voted No on some Israel aid provisions"},
          "Eli Crane":        {reason:"No on HR 8034; RLC Liberty Index 97/100"},
          "Bob Good":         {reason:"RLC Liberty Index 92/100"},
          "Andrew Ogles":     {reason:"RLC Liberty Index 95/100"},
          "Anna Paulina Luna":{reason:"RLC Liberty Index 94/100"},
          "Mike Lee":         {reason:"RLC Liberty Index 88/100"},
          "Ro Khanna":        {reason:"Co-sponsored HR 3565; co-sponsored Senate JRD on Israel FMS"},
          "Lloyd Doggett":    {reason:"Co-sponsored HR 3565 Block the Bombs Act"},
          "Jim McGovern":     {reason:"Co-sponsored HR 3565 Block the Bombs Act"},
          "Jan Schakowsky":   {reason:"Co-sponsored HR 3565 Block the Bombs Act"},
          "Maxine Waters":    {reason:"Co-sponsored HR 3565 Block the Bombs Act"},
          "Ed Markey":        {reason:"Co-sponsored Senate JRD on Israel FMS"},
          "Bernie Sanders":   {reason:"Forced Senate vote on JRD on Israel FMS (2024)"},
        };
        memberList = memberList.map(m => {
          const ka = KNOWN_ANTI_INTERVENTION[m.name];
          return ka ? {...m, antiArms:true, note:m.note||ka.reason} : m;
        });
        // Explicitly strip members whose TrackAIPAC classification is too weak
        // (called for conditions/review only — not votes or bill co-sponsorship)
        const REMOVE_FROM_ANTI = new Set([
          "Elizabeth Warren","Brian Schatz","Chris Van Hollen","Peter Welch",
        ]);
        memberList = memberList.map(m =>
          REMOVE_FROM_ANTI.has(m.name) ? {...m, antiArms:false} : m
        );
        // Fix lingering 'soft' language in notes
        memberList = memberList.map(m => ({
          ...m,
          note: (m.note||"").replace(/[-–—]?\s*classified soft\.?/gi,"").trim(),
        }));

        setMembers(memberList);
        setBills(d.bills || []);

        // Populate challengers from embedded endorsed lists
        const taEndorsed  = (d.trackaipac_endorsed || []).map(c => ({
          ...c, ps: c.ps || "UPCOMING", chamber: c.chamber || "house",
        }));
        const rlcEndorsed = (d.rlc_endorsed || []).map(c => ({
          ...c, ps: c.ps || "UPCOMING", chamber: c.chamber || "house",
        }));
        const seenNames = new Set(taEndorsed.map(c => c.name));
        // Also pull races_2026 challengers (e.g. Talarico won TX-D primary)
        const raceChalls = (d.races_2026||[])
          .filter(r => r.type === "challenger")
          .map(r => ({
            name:       r.name,
            party:      r.party,
            state:      r.state,
            chamber:    r.chamber,
            ps:         r.primary_result === "WON" ? "WON" : (r.status==="pending_general"?"GENERAL":"UPCOMING"),
            primaryDate:r.primary_date,
            note:       r.note || "",
            antiArms:   true,
            source:     "races_2026",
          }));
        const raceNames = new Set(raceChalls.map(c => c.name));
        const allChalls = [
          ...taEndorsed,
          ...rlcEndorsed.filter(c => !seenNames.has(c.name)),
          ...raceChalls.filter(c => !seenNames.has(c.name) && !raceNames.has("_dup")),
        ];
        if (allChalls.length > 0) setChalls(allChalls);
        if (d.races_2026 && d.races_2026.length) setRaces(d.races_2026);
        if (d.fec && Object.keys(d.fec).length > 0) setFec(d.fec);

        // Store poly snapshot (has token_ids) then immediately refresh
        const baseP = (d.poly && Object.keys(d.poly).length > 0) ? d.poly : {};
        setPolyBase(baseP);
        
        if (d.meta && d.meta.fetched_at) setFetchedAt(d.meta.fetched_at);
        const anti  = memberList.filter(m => m.antiArms).length;
        const age   = (d.meta && d.meta.fetched_at)
          ? Math.round((Date.now() - new Date(d.meta.fetched_at)) / 60000) : "?";
        setStatus("✓ " + anti + " anti-intervention · " + memberList.length + " members · " + age + "m ago");
        clearTimeout(window._aectLoadTimeout);

        // Kick off live refresh immediately after data loads
        const racesList = (d.races_2026 && d.races_2026.length) ? d.races_2026 : [];
        refreshPoly(memberList, racesList, baseP);

      } catch (e) {
        const msg = e && e.message ? e.message : String(e);
        setStatus("⚠ " + msg + " — Check GitHub Actions has run and data.json exists.");
        console.error("data.json load error:", e);
        setLoaded(true);   // always unblock render even on error
        return;
      }
      setLoaded(true);
    })().catch(e => {
      // Final safety net — if the async IIFE itself rejects (should never happen)
      console.error("useData IIFE rejected:", e);
      setStatus("⚠ Unexpected load error: " + (e && e.message ? e.message : e));
      setLoaded(true);
    });

    // Safety timeout — if data.json never resolves, unblock after 10s
    const _loadTimeout = setTimeout(() => {
      setLoaded(true);
      setStatus("⚠ Timed out loading data.json. Check GitHub Actions.");
    }, 10000);
    // Store cleanup ref on window (effect deps=[])
    window._aectLoadTimeout = _loadTimeout;

    try {
      const gun  = Gun({peers: GUN_PEERS, localStorage: false});
      const node = gun.get("aect-tracker-v1");
      node.get("fec").on(d => {
        if (d) {
          const c = Object.fromEntries(Object.entries(d).filter(([k]) => k !== "_"));
          if (Object.keys(c).length > 0) setFec(c);
        }
      });
    } catch (e) { console.warn("Gun.js:", e); }
  }, []);

  // 5-minute refresh cycle (batch CLOB only — fast, no Gamma search)
  useEffect(() => {
    if (allMembers.length === 0) return;
    const id = setInterval(() => {
      batchRefreshCLOB(polyBase).then(fresh => {
        if (Object.keys(fresh).length > 0) {
          setPolyLive(prev => ({...prev, ...fresh}));
          setPolyUpd(new Date().toISOString());
        }
      });
    }, 5 * 60 * 1000);
    return () => clearInterval(id);
  }, [allMembers.length, polyBase]);

  // Helper: apply live prices over base snapshot
  // polyLive always wins; polyBase provides token_ids even for un-refreshed entries
  const mergedPoly = {};
  const allPolyKeys = new Set([...Object.keys(polyBase), ...Object.keys(polyLive)]);
  for (const k of allPolyKeys) {
    mergedPoly[k] = polyLive[k] || polyBase[k];
  }

  return {
    allMembers, bills, challengers, history, races, fecData,
    polyData:    mergedPoly,
    polyLive,
    polyUpdated: polyUpdated,
    polyLoading,
    fetchedAt,   status, loaded,
  };
}

function ProbabilityGauge({prob, color, label, note}) {
  if (prob === null || prob === undefined) {
    return html`<div style=${{fontSize:9,color:"#4b5563",fontFamily:"monospace",textAlign:"center"}}>${label||"—"}</div>`;
  }
  const pct = Math.round(prob * 100);
  const r = 20;
  const circumference = Math.PI * r;
  const dash = prob * circumference;
  return html`
    <div style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
      <svg width="50" height="28" viewBox="0 0 50 28">
        <path d="M 5 25 A 20 20 0 0 1 45 25" fill="none" stroke="#1e2230" stroke-width="5" stroke-linecap="round"/>
        <path d="M 5 25 A 20 20 0 0 1 45 25" fill="none" stroke=${color} stroke-width="5"
          stroke-linecap="round"
          stroke-dasharray="${dash} ${circumference}"
          transform="rotate(0 25 25)"/>
        <text x="25" y="23" text-anchor="middle" font-size="9" font-family="monospace" fill=${color} font-weight="700">${pct}%</text>
      </svg>
      ${note ? html`<div style=${{fontSize:7,color:"#4b5563",fontFamily:"monospace",textAlign:"center",maxWidth:90,lineHeight:1.3}}>${note}</div>` : null}
    </div>`;
}

function CongressTimeline({allMembers, polyData, racesData}) {

  const stableMembers = allMembers.filter(m => {
    if (!m.antiArms) return false;
    return !races.find(r => r.name === m.name);
  });
  let p = {D:0, R:0};
  stableMembers.forEach(m => {
    p[m.party === "R" ? "R" : "D"] += 0.88;
  });
  races.forEach(r => {
    if (r.departing || r.impactDir <= 0 || r.winProb == null) return;
    const wp = r.win_prob != null ? r.win_prob : (r.winProb || 0);
    p[r.party === "R" ? "R" : "D"] += wp;
  });
  const proj = {D: Math.round(p.D), R: Math.round(p.R)};
  proj.total = proj.D + proj.R;

  // Fill live and projected into history
  const data = CONGRESS_HISTORY.map(d => {
    if (d.isLive) return {...d, D: live.D, R: live.R, total: live.total};
    if (d.isProjected) return {...d, D: proj.D, R: proj.R, total: proj.total};
    return d;
  }).filter(d => showProj || !d.isProjected);

  const chartW = 470, chartH = 175, padL = 36, padB = 32, padT = 12, padR = 12;
  const innerW = chartW - padL - padR;
  const innerH = chartH - padT - padB;
  const maxVal = Math.max(...data.map(d => (d.D||0)+(d.R||0))) * 1.15 || 50;
  const barW   = Math.min(50, innerW / data.length * 0.62);
  const gap    = innerW / data.length;
  const ys = v => innerH - (v / maxVal) * innerH;

  const bands = [
    {k:"D", c:"#818cf8", l:"Dem"},
    {k:"R", c:"#e879f9", l:"Rep"},
  ];
  const hov = hovered !== null ? data[hovered] : null;

  return html`
    <div style=${{background:"#0f1117",border:"1px solid #1a1d27",borderRadius:13,padding:"13px 15px",width:"100%",maxWidth:610}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:5}}>
        <div>
          <div style=${{fontSize:11,fontWeight:700,color:"#f0ebe0",fontFamily:"monospace"}}>Anti-Intervention Congress Over Time</div>
          <div style=${{fontSize:8,color:"#4b5563",fontFamily:"monospace",marginTop:1}}>115th (2017) → projected 120th (2027) · hover bars for detail</div>
        </div>
        <div style=${{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
          ${bands.map(b => html`
            <span key=${b.k} style=${{display:"inline-flex",alignItems:"center",gap:3,fontSize:8,color:b.c,fontFamily:"monospace"}}>
              <span style=${{width:7,height:7,borderRadius:2,background:b.c,display:"inline-block"}}/>
              ${b.l}
            </span>`)}
          <button onClick=${() => setShowProj(v => !v)}
            style=${{padding:"1px 6px",borderRadius:4,border:"1px solid #1e2230",background:"transparent",
              color:showProj?"#a5b4fc":"#374151",fontFamily:"monospace",fontSize:8,cursor:"pointer",marginLeft:2}}>
            ${showProj ? "Hide 120th" : "Show 120th"}
          </button>
        </div>
      </div>

      <svg width=${chartW} height=${chartH} viewBox=${"0 0 "+chartW+" "+chartH}
        style=${{fontFamily:"monospace",display:"block",maxWidth:"100%",overflow:"visible"}}>

        ${[0,10,20,30].filter(v => v <= maxVal).map(v => html`
          <g key=${v}>
            <line x1=${padL} y1=${padT+ys(v)} x2=${chartW-padR} y2=${padT+ys(v)}
              stroke="#1e2230" stroke-width="1" stroke-dasharray=${v===0?"none":"3,3"}/>
            <text x=${padL-4} y=${padT+ys(v)+3} text-anchor="end" font-size="7" fill="#374151">${v}</text>
          </g>`)}

        ${data.map((d, i) => {
          const cx = padL + i * gap + gap / 2;
          const x  = cx - barW / 2;
          const isProj = d.isProjected, isLive = d.isLive;
          let cumY = innerH;
          const tot = (d.D||0)+(d.R||0);
          return html`
            <g key=${i} onMouseEnter=${() => setHovered(i)} onMouseLeave=${() => setHovered(null)} style=${{cursor:"pointer"}}>
              ${bands.map((b, bi) => {
                const val = d[b.k] || 0;
                const h   = (val / maxVal) * innerH;
                const y   = padT + cumY - h;
                cumY -= h;
                if (!h) return null;
                return html`<rect key=${bi} x=${x} y=${y} width=${barW} height=${h}
                  fill=${b.c} opacity=${isProj ? 0.45 : isLive ? 1 : 0.75} rx="2"
                  stroke=${isProj ? "#a5b4fc" : "none"} stroke-width=${isProj ? "1" : "0"}
                  stroke-dasharray=${isProj ? "4,3" : "none"}/>`;
              })}
              <text x=${cx} y=${padT+ys(tot)-4} text-anchor="middle" font-size="8"
                fill=${isProj?"#a5b4fc":isLive?"#f0ebe0":"#9ca3af"} font-weight=${isLive?"700":"400"}>
                ${tot}${isProj?"*":""}
              </text>
              <text x=${cx} y=${chartH-padB+11} text-anchor="middle" font-size="8"
                fill=${isProj?"#a5b4fc":isLive?"#f0ebe0":"#6b7280"}>${d.congress}</text>
              <text x=${cx} y=${chartH-padB+21} text-anchor="middle" font-size="6.5" fill="#374151">${d.years}</text>
              ${isLive ? html`<text x=${cx} y=${chartH-padB+31} text-anchor="middle" font-size="6" fill="#4ade80">LIVE</text>` : null}
              ${isProj ? html`<text x=${cx} y=${chartH-padB+31} text-anchor="middle" font-size="6" fill="#a5b4fc">PROJ</text>` : null}
            </g>`;
        })}
      </svg>

      ${hov ? html`
        <div style=${{background:"#161920",border:"1px solid #1e2230",borderRadius:7,padding:"7px 10px",
          marginTop:5,fontSize:8,fontFamily:"monospace",color:"#9ca3af",lineHeight:1.7}}>
          <span style=${{color:"#f0ebe0",fontWeight:700}}>${hov.congress} · ${hov.years}</span>
          ${hov.isProjected?" — PROJECTED":hov.isLive?" — LIVE":""}<br/>
          <span style=${{color:"#818cf8"}}>D:${hov.D||0}</span>
          · <span style=${{color:"#e879f9"}}>R:${hov.R||0}</span>
          · Total:${(hov.D||0)+(hov.R||0)}
          ${hov.isProjected ? html`<br/><span style=${{color:"#374151"}}>*Expected value. Actual outcome will vary.</span>` : null}
        </div>` : null}

      <div style=${{display:"flex",gap:6,justifyContent:"center",alignItems:"center",
        marginTop:8,fontSize:8,color:"#374151",fontFamily:"monospace",flexWrap:"wrap"}}>
        <span style=${{color:"#818cf8"}}>2 members (2017)</span>
        <span>→</span>
        <span style=${{color:"#4ade80",fontWeight:700}}>${live.total} members (live)</span>
        <span>→</span>
        <span style=${{color:"#a5b4fc"}}>${proj.total} projected (2027)</span>
      </div>
    </div>

    <div style=${{width:"100%",maxWidth:610,marginTop:12}}>
      <div style=${{fontSize:9,fontFamily:"monospace",color:"#6b7280",marginBottom:6,letterSpacing:"0.1em"}}>
        KEY 2026 RACES
        <span style=${{color:"#374151",letterSpacing:"normal",fontWeight:400,marginLeft:6}}>click cards for detail</span>
      </div>
      <div style=${{display:"flex",flexWrap:"wrap",gap:6}}>
        ${races.map((r, i) => html`<${RaceCard} key=${i} race=${r} liveRacesData=${races}/>`)}
      </div>
      <div style=${{marginTop:7,fontSize:7,color:"#374151",fontFamily:"monospace",lineHeight:1.7}}>
        Win probabilities: Polymarket where available (marked ◉ live), else Cook Political / manual estimate.
        120th projection = expected value (sum of win_prob × seats). Actual outcome varies.
      </div>
    </div>`;
}

function App() {
  const [chamber,  setChamber]  = useState("house");
  const [selected, setSelected] = useState(null);
  const [hovered,  setHovered]  = useState(null);
  const [showAnti, setShowAnti] = useState(false);
  const [showTimeline, setShowTimeline] = useState(false);

  const {allMembers, bills, challengers, history, races, fecData, polyData, polyLive, polyUpdated, polyLoading, fetchedAt, status, loaded} = useData();

  // URL deep-link (mount only)
  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    if (p.get("chamber")==="senate") setChamber("senate");
    const mName = p.get("member");
    if (mName) setSelected(mName);
  }, []);

  useEffect(() => {
    const p = new URLSearchParams();
    if (chamber!=="house") p.set("chamber",chamber);
    if (selected) p.set("member",selected);
    const qs=p.toString();
    window.history.replaceState(null,"",qs?"?"+qs:window.location.pathname);
  }, [selected, chamber]);

  const svgW=610, svgH=300, cx=svgW/2, cy=svgH-14;
  const positions = useMemo(()=>computeHemicycle(allMembers,chamber,cx,cy),
    [allMembers, chamber, cx, cy]);

  const dotR      = chamber==="house" ? 4 : 6;
  const ch        = chamber==="house" ? "house" : "senate";
  // members = all chamber members for legend counts
  const chMem     = allMembers.filter(m => m.chamber === ch);
  const selMember = selected ? allMembers.find(m => m.name === selected) : null;
  const sideR     = allMembers.filter(m=>m.antiArms&&m.party==="R"&&m.chamber===ch);
  const sideD     = allMembers.filter(m=>m.antiArms&&m.party!=="R"&&m.chamber===ch);
  const challR    = challengers.filter(c=>c.party==="R"&&c.chamber===ch);
  const challD    = challengers.filter(c=>c.party!=="R"&&c.chamber===ch);

  if (!loaded) return html`
    <div style=${{minHeight:"100vh",background:"#0a0c10",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style=${{textAlign:"center",fontFamily:"monospace",color:"#374151",fontSize:10}}>
        <div style=${{fontSize:22,marginBottom:10,opacity:.2}}>◈</div>
        ${status}
      </div>
    </div>`;

  if (loaded && allMembers.length===0) return html`
    <div style=${{minHeight:"100vh",background:"#0a0c10",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style=${{textAlign:"center",fontFamily:"monospace",maxWidth:420}}>
        <div style=${{fontSize:22,marginBottom:10,opacity:.2}}>◈</div>
        <div style=${{color:"#fbbf24",marginBottom:8,fontSize:11}}>data.json loaded but contains no members yet.</div>
        <div style=${{color:"#374151",fontSize:9,lineHeight:1.8}}>
          Go to your GitHub repo → Actions → Refresh Data → Run workflow.<br/>
          The first run populates member data from TrackAIPAC. It takes ~2 minutes.
        </div>
        <button onClick=${()=>window.location.reload()}
          style=${{marginTop:14,padding:"6px 16px",borderRadius:7,border:"none",
            background:"#fbbf24",color:"#0a0c10",fontFamily:"monospace",fontSize:10,
            fontWeight:700,cursor:"pointer"}}>
          Reload page
        </button>
      </div>
    </div>`;

  return html`
    <div style=${{minHeight:"100vh",background:"#0a0c10",display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 10px"}}>

      <div style=${{textAlign:"center",marginBottom:10}}>
        <div style=${{fontSize:8,letterSpacing:"0.22em",textTransform:"uppercase",color:"#374151",fontFamily:"monospace",marginBottom:3}}>
          ANTI-ESTABLISHMENT CONGRESSIONAL TRACKER
        </div>
        <h1 style=${{fontSize:19,fontWeight:700,margin:"0 0 2px",letterSpacing:"-0.02em",color:"#f0ebe0"}}>
          Anti-Establishment Congressional Tracker
        </h1>
        <div style=${{fontSize:9,color:"#6b7280",display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",alignItems:"center"}}>
          <span style=${{fontFamily:"monospace",color:"#6b7280",fontSize:8}}>${status}</span>
          ${polyLoading ? html`<span style=${{fontFamily:"monospace",color:"#4ade80",fontSize:8}}>◉ fetching live odds…</span>` : null}
          ${!polyLoading && polyUpdated ? html`
            <span style=${{fontFamily:"monospace",color:"#4ade80",fontSize:8,opacity:0.7}}
              title=${"Polymarket live — " + Object.keys(polyLive||{}).length + " markets refreshed " + new Date(polyUpdated).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}>
              · ◉ ${Object.keys(polyLive||{}).length} live odds · ${new Date(polyUpdated).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}
            </span>` : html`<span style=${{fontFamily:"monospace",color:"#374151",fontSize:8}}>◎ odds from cache</span>`}
          ${fetchedAt?html`<span style=${{fontFamily:"monospace",color:"#374151",fontSize:8}}>
            · ${new Date(fetchedAt).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
          </span>`:null}
        </div>
      </div>

      <!-- Chamber toggle -->
      <div style=${{display:"flex",gap:2,background:"#161920",borderRadius:10,padding:3,marginBottom:9,border:"1px solid #1e2230"}}>
        ${["house","senate"].map(c=>html`
          <button key=${c} onClick=${()=>{setChamber(c);setSelected(null);setShowTimeline(false);}}
            style=${{padding:"5px 15px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:10,
              letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,
              background:chamber===c?"#f0ebe0":"transparent",color:chamber===c?"#0a0c10":"#6b7280"}}>
            ${c==="senate"?"Senate · 100":"House · 435"}
          </button>`)}
        <button onClick=${()=>setShowTimeline(v=>!v)}
          style=${{padding:"5px 15px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:10,
            letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,
            background:showTimeline?"#1a0a2e":"transparent",
            color:showTimeline?"#a5b4fc":"#6b7280",
            borderLeft:"1px solid #1e2230"}}>
          📈 Timeline
        </button>
      </div>

      <!-- Legend + stat pills -->
      <div style=${{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",marginBottom:7}}>
        ${[
          {c:"#991b1b", bg:"rgba(153,27,27,.1)",  l:"Rep",            n:chMem.filter(m=>m.party==="R"&&!m.antiArms).length},
          {c:"#e879f9", bg:"rgba(232,121,249,.1)", l:"Anti-Intv. R",  n:chMem.filter(m=>m.antiArms&&m.party==="R").length},
          {c:"#818cf8", bg:"rgba(129,140,248,.1)", l:"Anti-Intv. D",  n:chMem.filter(m=>m.antiArms&&m.party!=="R").length},
          {c:"#1e40af", bg:"rgba(30,64,175,.1)",   l:"Dem",           n:chMem.filter(m=>m.party==="D"&&!m.antiArms).length},
        ].map(b=>html`
          <span key=${b.l} style=${{display:"inline-flex",alignItems:"center",gap:4,background:b.bg,border:"1px solid "+b.c+"30",borderRadius:5,padding:"2px 7px",fontSize:9,fontFamily:"monospace",color:b.c}}>
            <span style=${{width:5,height:5,borderRadius:"50%",background:b.c,display:"inline-block"}}/>
            ${b.l+" "+b.n}
          </span>`)}
        <button onClick=${()=>setShowAnti(v=>!v)}
          style=${{padding:"2px 7px",borderRadius:5,border:"1px solid #7c3aed33",background:showAnti?"#7c3aed1a":"transparent",color:showAnti?"#c084fc":"#4b5563",fontFamily:"monospace",fontSize:9,cursor:"pointer"}}>
          ${showAnti?"Show all":"Highlight anti-intervention"}
        </button>

      </div>

      <!-- Three columns / Timeline toggle -->
      ${showTimeline ? html`
        <div style=${{width:"100%",maxWidth:860,display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
          <${CongressTimeline} allMembers=${allMembers} polyData=${polyData} racesData=${races}/>
        </div>`
      : html`
      <div class="three-col" style=${{display:"flex",gap:10,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"center",width:"100%",maxWidth:1080}}>

        <${MemberBox} title="Anti-Intervention Republicans" color="#a855f7"
          members=${sideR} challengers=${challR}
          fecData=${fecData} polyData=${polyData}
          onSelect=${m=>setSelected(m.name===selected?null:m.name)}/>

        <div class="ctr-col" style=${{display:"flex",flexDirection:"column",gap:7,alignItems:"center",flex:1,minWidth:0}}>

          <!-- Hemicycle SVG -->
          <div style=${{background:"#0f1117",border:"1px solid #1a1d27",borderRadius:13,overflow:"hidden",width:"100%",maxWidth:610}}>
            <svg class="hemi" width=${svgW} height=${svgH} viewBox=${"0 0 "+svgW+" "+svgH} style=${{display:"block",width:"100%",height:"auto"}}>
              ${(chamber==="senate"?[60,82,104]:[36,54,72,90,108]).map((r,i)=>
                html`<path key=${i} d=${"M "+(cx-r)+" "+cy+" A "+r+" "+r+" 0 0 1 "+(cx+r)+" "+cy} fill="none" stroke="#111419" stroke-width="1"/>`
              )}
              ${positions.map((pos,i)=>{
                if (!pos || pos._filler) return html`<circle key=${i} cx=${pos?pos._x:-999} cy=${pos?pos._y:-999} r=${dotR} fill="#111419" opacity=".4"/>`;
                const dimDot = showAnti && !pos.antiArms;
                const isSel  = selected === pos.name;
                const isHov  = hovered  === pos.name;
                const color  = dotColor(pos);
                const poly   = polyData[pos.name];
                const atRisk = poly && poly.prob < 0.65 && pos.antiArms;
                const r      = isHov ? dotR+1.5 : dotR;
                return html`<g key=${i}>
                  ${isSel?html`<circle cx=${pos._x} cy=${pos._y} r=${dotR+5} fill="none" stroke=${color} stroke-width="1.5" opacity=".4"/>`:null}
                  ${pos.antiArms&&!dimDot?html`<circle cx=${pos._x} cy=${pos._y} r=${dotR+2.5} fill="none" stroke=${color} stroke-width=".8" opacity=".18"/>`:null}
                  ${atRisk?html`<circle cx=${pos._x} cy=${pos._y} r=${dotR+3} fill="none" stroke="#fbbf24" stroke-width="1" opacity=".4" stroke-dasharray="2,2"/>`:null}
                  <circle cx=${pos._x} cy=${pos._y} r=${r}
                    fill=${dimDot?"#111419":color} opacity=${dimDot?0.12:1}
                    stroke=${isSel?"#fff":"none"} stroke-width="1.5"
                    style=${{cursor:"pointer", transition:"r 0.1s"}}
                    onClick=${()=>setSelected(selected===pos.name?null:pos.name)}
                    onMouseEnter=${()=>setHovered(pos.name)}
                    onMouseLeave=${()=>setHovered(null)}/>
                </g>`;
              })}
              <line x1=${cx} y1=${cy} x2=${cx} y2=${cy-(chamber==="senate"?104:108)-16} stroke="#1e2230" stroke-width="1" stroke-dasharray="3,3"/>
              <text x=${cx-100} y="11" fill="#991b1b" font-size="7" font-family="monospace" text-anchor="middle" opacity=".5">R</text>
              <text x=${cx-40}  y="11" fill="#e879f9" font-size="6" font-family="monospace" text-anchor="middle" opacity=".8">Anti-R</text>
              <text x=${cx+40}  y="11" fill="#818cf8" font-size="6" font-family="monospace" text-anchor="middle" opacity=".8">Anti-D</text>
              <text x=${cx+100} y="11" fill="#1e40af" font-size="7" font-family="monospace" text-anchor="middle" opacity=".5">D</text>
              <ellipse cx=${cx} cy=${cy+6} rx="18" ry="6" fill="#0f1117"/>
              <rect x=${cx-3} y=${cy-7} width="6" height="13" fill="#0f1117" rx="2"/>
            </svg>
          </div>

          <!-- Detail panel -->
          <div style=${{width:"100%",maxWidth:610,background:"#0f1117",border:"1px solid #1a1d27",borderRadius:11,padding:"10px 13px",minHeight:70}}>
            <${DetailPanel} member=${selMember} fecData=${fecData} polyData=${polyData} bills=${bills} chamber=${chamber}/>
          </div>

          <!-- Progress bars -->
          <div style=${{width:"100%",maxWidth:610}}>
            <${ProgressBars} chamber=${chamber} members=${members} allMembers=${allMembers} racesData=${races} polyData=${polyData}/>
          </div>

          <!-- Legislation -->
          <div style=${{width:"100%",maxWidth:610}}>
            <${BillsPanel} bills=${bills}/>
          </div>

          <!-- History -->
          <div style=${{width:"100%",maxWidth:610}}>
            <${HistoryTimeline} history=${history}/>
          </div>

          <!-- Find My Rep -->
          <div style=${{width:"100%",maxWidth:610}}>
            <${FindMyRep} members=${members} onHighlight=${setSelected}/>
          </div>
        </div>

        <${MemberBox} title="Anti-Intervention Democrats" color="#7c3aed"
          members=${sideD} challengers=${challD}
          fecData=${fecData} polyData=${polyData}
          onSelect=${m=>setSelected(m.name===selected?null:m.name)}/>

      </div>

      `}

      <div style=${{fontSize:8,color:"#1a1d27",marginTop:14,fontFamily:"monospace",textAlign:"center",maxWidth:800,lineHeight:1.8}}>
        MEMBERS: TRACKAIPAC.COM (D/I) + RLC LIBERTY INDEX (R) · VOTES: CONGRESS.GOV HOUSE-VOTE API + CLERK XML
        <br/>FINANCE: OPENFEC · ODDS: POLYMARKET · REPS: GOOGLE CIVIC · P2P: GUN.JS · REFRESH: 4H GITHUB ACTIONS
        <br/><a href="https://github.com/LukeRDavis/Anti-Establishment-Congressional-Tracker" target="_blank" style=${{color:"#374151"}}>github.com/LukeRDavis/Anti-Establishment-Congressional-Tracker</a>
      </div>
    </div>`;
}

render(html`<${App}/>`, document.getElementById("app"));


</script>
</body>
</html>
