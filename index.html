// ── Legislative thresholds — constitutional facts, never change ───────────────
const THRESHOLDS = {
  senate: [
    { n:41,  label:"Filibuster Bloc",     color:"#a78bfa",
      desc:"41 senators can sustain a filibuster, blocking any arms bill from reaching the floor." },
    { n:51,  label:"Majority Control",    color:"#7c3aed",

    { n:67,  label:"Veto Override Block", color:"#6d28d9",

    { n:218, label:"Majority Control",    color:"#7c3aed",

// ── Color scheme ──────────────────────────────────────────────────────────────
// Hard = legislative action (co-sponsored bill / on-record vote)
// Soft = TrackAIPAC approved (rejects AIPAC money, no legislative vote yet)
//
//  R ────────── Soft Anti-R ──── Hard Anti-R ──── Hard Anti-D ──── Soft Anti-D ──────── D
//  #991b1b      #a855f7          #c026d3           #7c3aed           #818cf8              #1e40af

function dotColor(m) {
  if (!m.antiArms) {
    if (m.party === "R") return "#991b1b";
    if (m.party === "D") return "#1e40af";
    return "#9ca3af";
  }
  const hard = m.antiArmsLevel === "hard";
  if (m.party === "R") return hard ? "#c026d3" : "#a855f7";
  return hard ? "#7c3aed" : "#818cf8";
}

function antiArmsTag(m) {
  if (!m.antiArms) return null;
  return m.antiArmsLevel === "hard" ? "Hard Anti-Arms" : "Soft Anti-Arms";
}

function antiArmsTagColor(m) {
  if (!m.antiArms) return "#9ca3af";
  return m.antiArmsLevel === "hard"
    ? (m.party === "R" ? "#c026d3" : "#7c3aed")
    : (m.party === "R" ? "#a855f7" : "#818cf8");
}

// ── Hemicycle layout ──────────────────────────────────────────────────────────
function computeHemicycle(n, cx, cy, innerR, spacing, rows) {
  const radii  = Array.from({length:rows}, (_,i) => innerR + i*spacing);
  const total  = radii.reduce((s,r) => s+r, 0);
  let   perRow = radii.map(r => Math.round((r/total)*n));
  perRow[perRow.length-1] += n - perRow.reduce((a,b)=>a+b, 0);
  const pts = [];
  for (let row=0; row<rows; row++) {
    const r=radii[row], c=perRow[row];
    for (let s=0; s<c; s++) {
      const a = Math.PI*(s/(c-1||1));
      pts.push({x: cx - r*Math.cos(a), y: cy - r*Math.sin(a), angle: a});
    }
  }
  pts.sort((a,b) => b.angle - a.angle || a.y - b.y);
  return pts;
}

function buildMembers(allMembers, chamber) {
  const ch    = chamber === "house" ? "house" : "senate";
  const chMem = allMembers.filter(m => m.chamber === ch);

  // Seat order L→R: R | softAntiR | hardAntiR | hardAntiD | softAntiD | D | I
  const hardAntiR = chMem.filter(m => m.antiArms && m.party==="R" && m.antiArmsLevel==="hard");
  const softAntiR = chMem.filter(m => m.antiArms && m.party==="R" && m.antiArmsLevel!=="hard");
  const hardAntiD = chMem.filter(m => m.antiArms && m.party!=="R" && m.antiArmsLevel==="hard");
  const softAntiD = chMem.filter(m => m.antiArms && m.party!=="R" && m.antiArmsLevel!=="hard");
  const restR     = chMem.filter(m => !m.antiArms && m.party==="R");
  const restD     = chMem.filter(m => !m.antiArms && m.party==="D");
  const restI     = chMem.filter(m => !m.antiArms && m.party==="I");

  function fill(party, count) {
    return Array.from({length:Math.max(0,count)}, (_,i)=>({
      id:10000+(party==="R"?0:party==="D"?10000:20000)+i,
      name:party+"-"+(i+1), party, state:"", antiArms:false, chamber:ch, _filler:true
    }));
  }

  const rFill = restR.length > 0 ? restR : fill("R", ch==="house" ? 220-hardAntiR.length-softAntiR.length : 53-hardAntiR.length-softAntiR.length);
  const dFill = restD.length > 0 ? restD : fill("D", ch==="house" ? 215-hardAntiD.length-softAntiD.length : 45-hardAntiD.length-softAntiD.length);
  const iFill = restI.length > 0 ? restI : (ch==="senate" ? fill("I",2) : []);

  return [...rFill, ...softAntiR, ...hardAntiR, ...hardAntiD, ...softAntiD, ...dFill, ...iFill];
}

function fmtM(n) {
  if (!n&&n!==0) return "—";
  if (n>=1e6) return "$"+(n/1e6).toFixed(1)+"M";
  if (n>=1e3) return "$"+Math.round(n/1e3)+"K";
  return "$"+n;
}

// ── Status badge ──────────────────────────────────────────────────────────────
function StatusBadge({ps, prob}) {
  const isInc = ps==="INCUMBENT"||ps==="INCUMBENT_RISK";
  if (isInc && prob!=null) {
    const pct=Math.round(prob*100), risk=prob<0.65;
    return html`<span style=${{fontSize:9,padding:"1px 6px",borderRadius:3,fontFamily:"monospace",whiteSpace:"nowrap",
      background:risk?"rgba(251,191,36,.15)":"rgba(34,197,94,.1)",color:risk?"#fbbf24":"#4ade80"}}>
      ${risk?"⚡ At Risk · "+pct+"%":"✓ "+pct+"%"}
    </span>`;
  }
  const MAP = {
    INCUMBENT:       {bg:"rgba(34,197,94,.1)",   c:"#4ade80",t:"✓ Incumbent"},
    INCUMBENT_RISK:  {bg:"rgba(251,191,36,.15)", c:"#fbbf24",t:"⚡ At Risk"},
    DEFEATED:        {bg:"rgba(239,68,68,.13)",  c:"#f87171",t:"✗ Defeated"},
    RESIGNED:        {bg:"rgba(156,163,175,.1)", c:"#9ca3af",t:"Resigned"},
    RETIRED:         {bg:"rgba(156,163,175,.1)", c:"#9ca3af",t:"Retired"},
    RETIRING:        {bg:"rgba(156,163,175,.1)", c:"#9ca3af",t:"Retiring '26"},
    FLIPPED:         {bg:"rgba(251,191,36,.13)", c:"#fbbf24",t:"~ Flipped"},
    RUNOFF:          {bg:"rgba(251,191,36,.15)", c:"#f59e0b",t:"⚡ Runoff"},
    RECOUNT:         {bg:"rgba(251,191,36,.15)", c:"#f59e0b",t:"🔄 Recount"},
    UPCOMING:        {bg:"rgba(139,92,246,.12)", c:"#a78bfa",t:"🗓 Upcoming"},
    RESULTS_PENDING: {bg:"rgba(251,191,36,.15)", c:"#fbbf24",t:"📊 Pending"},
    WON:             {bg:"rgba(34,197,94,.13)",  c:"#4ade80",t:"✓ WON"},
    GENERAL:         {bg:"rgba(139,92,246,.12)", c:"#a78bfa",t:"🗓 General"},
  };
  const s = MAP[ps]||{bg:"transparent",c:"#9ca3af",t:ps||"—"};
  return html`<span style=${{fontSize:9,padding:"1px 6px",borderRadius:3,fontFamily:"monospace",whiteSpace:"nowrap",background:s.bg,color:s.c}}>${s.t}</span>`;
}

// ── Anti-arms level badge ─────────────────────────────────────────────────────
function ArmsBadge({m}) {
  if (!m || !m.antiArms) return null;
  const hard  = m.antiArmsLevel === "hard";
  const color = antiArmsTagColor(m);
  const bg    = hard ? color+"22" : color+"14";
  return html`<span style=${{fontSize:8,padding:"1px 6px",borderRadius:3,fontFamily:"monospace",
    whiteSpace:"nowrap",background:bg,color,border:"1px solid "+color+"33"}}>
    ${hard ? "⚡ Hard Anti-Arms" : "◦ Soft Anti-Arms"}
  </span>`;
}

// ── Progress bars ─────────────────────────────────────────────────────────────
function ProgressBars({chamber, members}) {
  const hard    = members.filter(m=>m.antiArms && m.antiArmsLevel==="hard").length;
  const soft    = members.filter(m=>m.antiArms && m.antiArmsLevel!=="hard").length;
  const current = hard + soft;

  return html`
    <div style=${{background:"#0f1117",border:"1px solid #1e2230",borderRadius:12,padding:"12px 14px",width:"100%",boxSizing:"border-box"}}>
      <div style=${{fontSize:9,color:"#a78bfa",fontFamily:"monospace",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:7}}>
        ◈ Anti-Arms Coalition · ${chamber==="senate"?"Senate":"House"}
      </div>

      <div style=${{display:"flex",gap:12,marginBottom:10,flexWrap:"wrap"}}>
        <span style=${{fontSize:8,fontFamily:"monospace",display:"flex",alignItems:"center",gap:4}}>
          <span style=${{width:9,height:9,borderRadius:2,background:"#7c3aed",display:"inline-block",flexShrink:0}}/>
          <span style=${{color:"#a78bfa",fontWeight:600}}>Hard ${hard}</span>
          <span style=${{color:"#374151"}}> co-sponsored or voted on record</span>
        </span>
        <span style=${{fontSize:8,fontFamily:"monospace",display:"flex",alignItems:"center",gap:4}}>
          <span style=${{width:9,height:9,borderRadius:2,background:"#818cf8",opacity:0.7,display:"inline-block",flexShrink:0}}/>
          <span style=${{color:"#818cf8",fontWeight:600}}>Soft ${soft}</span>
          <span style=${{color:"#374151"}}> rejects AIPAC, no vote yet</span>
        </span>
      </div>

      ${THRESHOLDS[chamber].map((th,i) => {
        const hardPct = Math.min(100, Math.round((hard/th.n)*100));
        const softPct = Math.min(100-hardPct, Math.round((soft/th.n)*100));
        const reached = current >= th.n;
        const hardHit = hard >= th.n;
        return html`
          <div key=${i} style=${{marginBottom:i<THRESHOLDS[chamber].length-1?14:0}}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <span style=${{fontSize:10,color:reached?"#4ade80":th.color,fontWeight:600}}>${th.label}</span>
              <div style=${{display:"flex",gap:4,alignItems:"center",fontFamily:"monospace"}}>
                <span style=${{fontSize:8,color:"#a78bfa"}}>${hard}H</span>
                <span style=${{fontSize:8,color:"#374151"}}>+</span>
                <span style=${{fontSize:8,color:"#818cf8"}}>${soft}S</span>
                <span style=${{fontSize:8,color:"#374151"}}>=</span>
                <span style=${{fontSize:10,color:reached?"#4ade80":"#6b7280",fontWeight:600}}>
                  ${current}/${th.n}${reached?" ✓":""}
                </span>
              </div>
            </div>
            <div style=${{height:7,borderRadius:4,background:"#1a1d27",overflow:"hidden",marginBottom:4,position:"relative"}}>
              <div style=${{position:"absolute",left:0,top:0,height:"100%",
                width:hardPct+"%",background:hardHit?"#4ade80":"#7c3aed",
                borderRadius:4,transition:"width 0.8s ease"}}/>
              <div style=${{position:"absolute",left:hardPct+"%",top:0,height:"100%",
                width:softPct+"%",background:"#818cf8",opacity:0.6,
                transition:"all 0.8s ease"}}/>
            </div>
            <div style=${{fontSize:8,color:hardHit?"#4ade80":"#374151",fontFamily:"monospace",marginBottom:3}}>
              ${hardHit
                ? "✓ Hard threshold reached — "+hard+" members with on-record legislative vote"
                : "Hard-only: "+hard+"/"+th.n+" — need "+(th.n-hard)+" more with a legislative vote"}
            </div>
            <div style=${{fontSize:9,color:"#374151",lineHeight:1.5}}>${th.desc}</div>
          </div>`;
      })}
    </div>`;
}

// ── Tracked Legislation Panel ─────────────────────────────────────────────────
function BillsPanel({bills}) {
  if (!bills||bills.length===0) return null;
  const anti = bills.filter(b=>b.classification==="anti_arms");
  const pro  = bills.filter(b=>b.classification==="pro_arms");
  const BillRow = ({b}) => html`
    <div style=${{padding:"6px 9px",borderBottom:"1px solid #0e1016"}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:4,marginBottom:2}}>
        <a href=${b.url} target="_blank" rel="noreferrer"
          style=${{fontSize:10,color:"#e8e4dc",fontWeight:600,lineHeight:1.3,flex:1,textDecoration:"none"}}>
          ${b.type} ${b.number}
          <span style=${{fontSize:8,color:"#374151",marginLeft:3}}>↗</span>
        </a>
        <span style=${{fontSize:8,padding:"1px 5px",borderRadius:3,fontFamily:"monospace",whiteSpace:"nowrap",
          background:b.classification==="anti_arms"?"rgba(124,58,237,.15)":"rgba(239,68,68,.13)",
          color:b.classification==="anti_arms"?"#a78bfa":"#f87171"}}>
          ${b.classification==="anti_arms"?"🚫 Restricts":"🔫 Authorizes"}
        </span>
      </div>
      <div style=${{fontSize:9,color:"#4b5563",lineHeight:1.4,marginBottom:2}}>
        ${(b.title||"").slice(0,90)}${(b.title||"").length>90?"…":""}
      </div>
      <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
        ${b.sponsor_count?html`<span style=${{fontSize:8,fontFamily:"monospace",color:"#374151"}}>${b.sponsor_count} sponsors</span>`:null}
        ${b.last_action_date?html`<span style=${{fontSize:8,fontFamily:"monospace",color:"#374151"}}>${b.last_action_date}</span>`:null}
      </div>
    </div>`;
  return html`
    <div style=${{background:"#0f1117",border:"1px solid #1e2230",borderRadius:12,overflow:"hidden",width:"100%",boxSizing:"border-box"}}>
      <div style=${{padding:"8px 11px",background:"#090b0e",borderBottom:"1px solid #1e2230"}}>
        <div style=${{fontSize:9,color:"#a78bfa",fontFamily:"monospace",letterSpacing:"0.14em",textTransform:"uppercase"}}>◈ Tracked Legislation · Auto-discovered</div>
        <div style=${{fontSize:8,color:"#374151",marginTop:2}}>${anti.length} arms-restricting · ${pro.length} arms-authorizing · refreshed from api.congress.gov</div>
      </div>
      ${anti.length>0?html`
        <div style=${{padding:"3px 9px",background:"#0a0c10",fontSize:8,color:"#374151",fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>Anti-Arms Legislation</div>
        ${anti.map((b,i)=>html`<${BillRow} key=${i} b=${b}/>`)}`:null}
      ${pro.length>0?html`
        <div style=${{padding:"3px 9px",background:"#0a0c10",fontSize:8,color:"#374151",fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>Pro-Arms (tracked for No votes)</div>
        ${pro.map((b,i)=>html`<${BillRow} key=${i} b=${b}/>`)}`:null}
    </div>`;
}

// ── Member box (side panel) ───────────────────────────────────────────────────
function MemberBox({title, color, members, challengers, fecData, polyData, onSelect}) {
  const [tab, setTab] = useState("members");

  const hard     = members.filter(m=>m.antiArmsLevel==="hard" && !["RETIRED","RESIGNED","DEFEATED","RETIRING","FLIPPED"].includes(m.ps));
  const soft     = members.filter(m=>m.antiArmsLevel!=="hard" && !["RETIRED","RESIGNED","DEFEATED","RETIRING","FLIPPED"].includes(m.ps));
  const departed = members.filter(m=>["RETIRED","RESIGNED","DEFEATED","FLIPPED","RETIRING"].includes(m.ps));

  const groups = {
    RECOUNT:  challengers.filter(c=>c.ps==="RECOUNT"),
    PENDING:  challengers.filter(c=>c.ps==="RESULTS_PENDING"),
    RUNOFF:   challengers.filter(c=>c.ps==="RUNOFF"),
    WON:      challengers.filter(c=>c.ps==="WON"),
    UPCOMING: challengers.filter(c=>c.ps==="UPCOMING"||c.ps==="GENERAL"),
    DEFEATED: challengers.filter(c=>c.ps==="DEFEATED"),
  };

  const Row = ({m, isChallenger}) => {
    const fec  = fecData[m.name];
    const poly = polyData[m.name];
    const loc  = m.state+(m.district!=null?"-"+m.district:m.chamber==="senate"?" · S":"");
    return html`
      <div onClick=${()=>onSelect&&onSelect(m)}
        style=${{padding:"6px 9px",borderBottom:"1px solid #0e1016",cursor:"pointer"}}
        onMouseEnter=${e=>{e.currentTarget.style.background="#0e1016";}}
        onMouseLeave=${e=>{e.currentTarget.style.background="transparent";}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:4,marginBottom:2}}>
          <span style=${{fontSize:11,color:"#e8e4dc",fontWeight:600,lineHeight:1.2,flex:1}}>${m.name}</span>
          <${StatusBadge} ps=${m.ps||"INCUMBENT"} prob=${poly?.prob}/>
        </div>
        <div style=${{display:"flex",gap:5,flexWrap:"wrap",marginBottom:2}}>
          <span style=${{fontSize:8,fontFamily:"monospace",color:"#374151"}}>${loc}${isChallenger&&m.primaryDate?" · "+m.primaryDate:""}</span>
          ${!isChallenger?html`<${ArmsBadge} m=${m}/>`:null}
        </div>
        ${m.note?html`<div style=${{fontSize:8,color:"#374151",lineHeight:1.3,marginBottom:2}}>${m.note.slice(0,70)}${m.note.length>70?"…":""}</div>`:null}
        ${m.rlc_score?html`<span style=${{fontSize:8,fontFamily:"monospace",color:"#fbbf24",opacity:.7}}>RLC ${m.rlc_score}/100</span>`:null}
        ${fec?html`
          <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
            ${fec.raised!=null?html`<span style=${{fontSize:8,fontFamily:"monospace",color:"#4b5563"}}>↑${fmtM(fec.raised)}</span>`:null}
            ${fec.ie_against>0?html`<span style=${{fontSize:8,fontFamily:"monospace",color:"#f87171"}}>⚡${fmtM(fec.ie_against)} vs</span>`:null}
          </div>`:null}
      </div>`;
  };

  const Section = ({label, items, isChallenger}) => {
    if (!items||!items.length) return null;
    return html`<${Fragment}>
      ${label?html`<div style=${{padding:"3px 9px",background:"#090b0e",fontSize:8,color:"#374151",fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>${label}</div>`:null}
      ${items.map((m,i)=>html`<${Row} key=${i} m=${m} isChallenger=${isChallenger}/>`)}
    </${Fragment}>`;
  };

  return html`
    <div class="side-box" style=${{width:222,background:"#0f1117",border:"1px solid "+color+"22",borderRadius:12,overflow:"hidden",flexShrink:0}}>
      <div style=${{background:"linear-gradient(135deg,"+color+"16,"+color+"05)",borderBottom:"1px solid "+color+"22",padding:"9px 11px"}}>
        <div style=${{fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color,fontFamily:"monospace"}}>${title}</div>
        <div style=${{fontSize:8,color:"#374151",marginTop:2}}>
          ${hard.length} hard · ${soft.length} soft · ${departed.length} departed · ${challengers.length} challengers
        </div>
      </div>
      <div style=${{display:"flex",borderBottom:"1px solid #0e1016"}}>
        ${[["members","Members"],["challengers","Challengers"]].map(([k,l])=>html`
          <button key=${k} onClick=${()=>setTab(k)} style=${{
            flex:1,padding:"5px",border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:9,
            background:tab===k?"#161920":"transparent",color:tab===k?color:"#374151",
            borderBottom:tab===k?"2px solid "+color:"none"}}>
            ${l}
          </button>`)}
      </div>
      <div style=${{maxHeight:440,overflowY:"auto"}}>
        ${tab==="members"?html`
          ${hard.length>0?html`<div style=${{padding:"3px 9px",background:"#090b0e",fontSize:8,color:"#374151",fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>⚡ Hard Anti-Arms</div>`:null}
          <${Section} items=${hard}/>
          ${soft.length>0?html`<div style=${{padding:"3px 9px",background:"#090b0e",fontSize:8,color:"#374151",fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>◦ Soft Anti-Arms</div>`:null}
          <${Section} items=${soft}/>
          <${Section} label="Departed" items=${departed}/>
        `:html`
          ${challengers.length===0?html`<div style=${{padding:16,fontSize:10,color:"#374151",textAlign:"center"}}>No challengers tracked.</div>`:null}

function HistoryTimeline({history}) {
  const [filter, setFilter] = useState("all");
  const events = (history.events||[]).filter(e =>
    filter==="all" ? true :
    filter==="flips" ? (e.change==="pro_to_anti"||e.change==="anti_to_pro") :
    filter==="departures" ? e.change==="departed" : true
  );
  const STYLE = {
    pro_to_anti: {color:"#a78bfa",bg:"rgba(124,58,237,.13)",icon:"✦",label:"Pro → Anti-Arms"},
    anti_to_pro: {color:"#f87171",bg:"rgba(239,68,68,.13)", icon:"✗",label:"Anti → Pro-Arms"},
    departed:    {color:"#9ca3af",bg:"rgba(156,163,175,.1)",icon:"○",label:"Departed"},
  };
  const fmtDate = iso => {
    try { return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }

  if (!history.events||history.events.length===0) return html`
    <div style=${{background:"#0f1117",border:"1px solid #1e2230",borderRadius:12,padding:"16px",width:"100%",boxSizing:"border-box",textAlign:"center",color:"#374151",fontSize:10,fontFamily:"monospace"}}>

      <div style=${{padding:"10px 14px",background:"#090b0e",borderBottom:"1px solid #1e2230",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>

          ${[["all","All"],["flips","Flips"],["departures","Departures"]].map(([k,l])=>html`

        html`<div style=${{maxHeight:340,overflowY:"auto"}}>

// ── Find My Rep ───────────────────────────────────────────────────────────────
function FindMyRep({members, onHighlight}) {
  const [addr,setAddr]=useState(""), [reps,setReps]=useState(null), [loading,setLoad]=useState(false), [err,setErr]=useState(null);
  const lookup = async () => {
    if (!addr.trim()) return;
    setLoad(true); setErr(null); setReps(null);
    try {
      const r = await fetch("https://civicinfo.googleapis.com/civicinfo/v2/representatives"
        +"?key="+CIVIC_KEY+"&address="+encodeURIComponent(addr.trim())
        +"&levels=country&roles=legislatorUpperBody&roles=legislatorLowerBody");
      if (!r.ok) throw new Error();
      const d = await r.json();
      const out=[];
      (d.offices||[]).forEach(o=>(o.officialIndices||[]).forEach(i=>{
        const off=d.officials?.[i]; if(off) out.push({name:off.name,party:off.party,photo:off.photoUrl,phones:off.phones,urls:off.urls,office:o.name});
      }));
      setReps(out);
      out.forEach(rep=>{
        const i=members.findIndex(m=>m.name&&rep.name&&m.name.toLowerCase().includes(rep.name.split(" ").slice(-1)[0].toLowerCase()));
        if(i>=0) onHighlight(i);
      });
    } catch { setErr("Address not found. Try a full US street address."); }
    setLoad(false);
  };
  const pc = p=>p==="Democratic"||p==="Democrat"?"#1e40af":p==="Republican"?"#991b1b":"#9ca3af";
  return html`
    <div style=${{background:"#0f1117",border:"1px solid #1e2230",borderRadius:12,padding:"11px 13px",width:"100%",boxSizing:"border-box"}}>
      <div style=${{fontSize:9,color:"#fbbf24",fontFamily:"monospace",letterSpacing:"0.12em",marginBottom:6,textTransform:"uppercase"}}>⊙ Find My Representatives · Google Civic API</div>
      <div style=${{display:"flex",gap:5}}>
        <input value=${addr} onInput=${e=>setAddr(e.target.value)} onKeyDown=${e=>e.key==="Enter"&&lookup()}
          placeholder="Enter your US address and press Enter…"
          style=${{flex:1,background:"#090b0e",border:"1px solid #1e2230",borderRadius:7,padding:"5px 9px",color:"#e8e4dc",fontSize:11,fontFamily:"monospace",outline:"none"}}/>
        <button onClick=${lookup} disabled=${loading}
          style=${{padding:"5px 12px",borderRadius:7,border:"none",cursor:"pointer",background:loading?"#1a1d27":"#fbbf24",color:"#0a0c10",fontFamily:"monospace",fontSize:11,fontWeight:700}}>
          ${loading?"…":"Look up"}
        </button>
      </div>
      ${err?html`<div style=${{fontSize:9,color:"#f87171",marginTop:4,fontFamily:"monospace"}}>${err}</div>`:null}
      ${reps&&reps.length?html`
        <div style=${{marginTop:8,display:"flex",flexWrap:"wrap",gap:7}}>
          ${reps.map((rep,i)=>html`
            <div key=${i} style=${{flex:"1 1 170px",background:"#12151c",borderRadius:8,border:"1px solid "+pc(rep.party)+"22",padding:"7px 9px"}}>
              <div style=${{display:"flex",gap:7,alignItems:"center",marginBottom:3}}>
                ${rep.photo?html`<img src=${rep.photo} alt=${rep.name} style=${{width:24,height:24,borderRadius:"50%",objectFit:"cover",flexShrink:0}} onError=${e=>{e.target.style.display="none";}}/>`:null}
                <div>
                  <div style=${{fontSize:11,fontWeight:700,color:"#f0ebe0",lineHeight:1.2}}>${rep.name}</div>
                  <div style=${{fontSize:8,color:"#374151",fontFamily:"monospace"}}>${rep.office}</div>
                </div>
              </div>
              <div style=${{display:"flex",gap:5,flexWrap:"wrap"}}>
                <span style=${{fontSize:8,padding:"1px 5px",borderRadius:3,background:pc(rep.party)+"18",color:pc(rep.party),fontFamily:"monospace"}}>${rep.party}</span>
                ${rep.phones?.[0]?html`<a href=${"tel:"+rep.phones[0]} style=${{fontSize:8,color:"#4b5563",fontFamily:"monospace",textDecoration:"none"}}>📞 ${rep.phones[0]}</a>`:null}
                ${rep.urls?.[0]?html`<a href=${rep.urls[0]} target="_blank" rel="noreferrer" style=${{fontSize:8,color:"#4b9cd3",fontFamily:"monospace",textDecoration:"none"}}>↗ Web</a>`:null}
              </div>
            </div>`)}
        </div>`:null}
    </div>`;
}

            "Andrew Ogles":      {level:"soft", reason:"RLC Liberty Index 95/100; voted against multiple foreign aid packages"},
            "Anna Paulina Luna": {level:"soft", reason:"RLC Liberty Index 94/100; voted against Israel aid supplemental"},
            "Mike Lee":          {level:"soft", reason:"RLC Liberty Index 88/100; consistent anti-interventionist Senate record"},
            "Ro Khanna":       {level:"hard", reason:"Co-sponsored HR 3565 Block the Bombs Act; co-sponsored Senate JRD on Israel FMS"},
            "Lloyd Doggett":   {level:"hard", reason:"Co-sponsored HR 3565 Block the Bombs Act"},
            "Jim McGovern":    {level:"hard", reason:"Co-sponsored HR 3565 Block the Bombs Act"},
            "Jan Schakowsky":  {level:"hard", reason:"Co-sponsored HR 3565 Block the Bombs Act"},
            "Maxine Waters":   {level:"hard", reason:"Co-sponsored HR 3565 Block the Bombs Act"},
            "Jamie Raskin":    {level:"soft", reason:"Publicly called for arms conditions; voting record mixed"},
            "Ed Markey":       {level:"hard", reason:"Co-sponsored Senate Joint Resolution of Disapproval on Israel FMS"},
            "Brian Schatz":    {level:"soft", reason:"Signed letters on arms conditions; no co-sponsorship of JRD yet"},
            "Elizabeth Warren":{level:"soft", reason:"Called for arms review; no co-sponsorship of JRD yet"},
            "Bernie Sanders":  {level:"hard", reason:"Forced Senate vote on Joint Resolution of Disapproval on Israel FMS (2024)"},
          };
          memberList = memberList.map(m => {
            const ka = KNOWN_ANTI_ARMS[m.name];
            if (ka) return {...m, antiArms:true, antiArmsLevel:ka.level, note:m.note||ka.reason};
            return m;
          });
        }
        setMembers(memberList);
        setBills(d.bills || []);
        if (d.races_2026?.length) setRaces(d.races_2026);
        if (d.fec&&Object.keys(d.fec).length>0)   setFec(d.fec);
        if (d.poly&&Object.keys(d.poly).length>0)  setPoly(d.poly);
        if (d.meta?.fetched_at) setFetchedAt(d.meta.fetched_at);

        const anti  = memberList.filter(m=>m.antiArms).length;
        const hard  = memberList.filter(m=>m.antiArmsLevel==="hard").length;
        const total = memberList.length;
        const age   = d.meta?.fetched_at
          ? Math.round((Date.now()-new Date(d.meta.fetched_at))/60000) : "?";
        const rlcCount = memberList.filter(m=>m.rlc_score && m.rlc_score>=75).length;
        setStatus("✓ "+anti+" anti-arms ("+hard+" hard) · "+total+" members · RLC:"+rlcCount+" · "+age+"m ago");
      } catch(e) {
        setStatus("⚠ Could not load data.json — run the GitHub Action to generate it.");
        console.error("data.json:", e);
        setLoaded(true);
      }
      setLoaded(true);
    })();

    // Gun.js: share FEC/Polymarket between peers (non-blocking)
    try {
      const gun  = Gun({peers:GUN_PEERS, localStorage:false});
      const node = gun.get("anti-arms-tracker-v4");
      node.get("fec").on(d=>{
        if(d){const c=Object.fromEntries(Object.entries(d).filter(([k])=>k!=="_"));if(Object.keys(c).length>0)setFec(c);}
      });
      node.get("poly").on(d=>{
        if(d){const c=Object.fromEntries(Object.entries(d).filter(([k])=>k!=="_"));if(Object.keys(c).length>0)setPoly(c);}
      });
    } catch(e) { console.warn("Gun.js:", e); }
  }, []);

  return {allMembers, bills, challengers, history, fecData, polyData, fetchedAt, status, loaded};
}

function CongressShifts({allMembers, challengers, congress_history, races_2026}) {

  const hist   = congress_history || CONGRESS_HISTORY_STATIC;
  const races  = (races_2026 && races_2026.length > 0) ? races_2026 : RACES_2026_STATIC;

  const [raceFilter, setRaceFilter] = useState("all");

  // Live 119th data from members
  const hardR19 = allMembers.filter(m=>m.antiArms&&m.party==="R"&&m.antiArmsLevel==="hard").length;
  const softR19 = allMembers.filter(m=>m.antiArms&&m.party==="R"&&m.antiArmsLevel!=="hard").length;
  const hardD19 = allMembers.filter(m=>m.antiArms&&m.party!=="R"&&m.antiArmsLevel==="hard").length;
  const softD19 = allMembers.filter(m=>m.antiArms&&m.party!=="R"&&m.antiArmsLevel!=="hard").length;
  const total19 = hardR19+softR19+hardD19+softD19;

  // 120th projection: EV calculation from races

  const incumbentRaces = activeRaces.filter(r=>r.type==="incumbent");
  const challengerRaces = activeRaces.filter(r=>r.type==="challenger");
  // Expected change: incumbents retain with winProb, challengers gain with winProb
  const evDelta = incumbentRaces.reduce((s,r)=>{
    // If incumbent loses we lose 1; expected = -(1-p)
    return s - (1 - r.winProb);
  }, 0) + challengerRaces.reduce((s,r)=>{
    return s + r.winProb;  // gain if challenger wins
  }, 0);
  const proj20 = Math.round(total19 + evDelta);
  const proj20Low  = Math.round(total19 - incumbentRaces.filter(r=>r.winProb<0.85).length - 1);
  const proj20High = Math.round(total19 + challengerRaces.reduce((s,r)=>s+1,0) + 1);

}

function ProbabilityGauge({prob, color, label, note, compact}) {
  if (prob === null) return html`<div style=${{fontSize:9,color:"#4b5563",fontFamily:"monospace"}}>${label}</div>`;
  const pct = Math.round(prob * 100);
  const arc = (prob, r) => {
    const angle = prob * Math.PI;
    const x = 28 + r * Math.cos(Math.PI - angle);
    const y = 28 - r * Math.sin(Math.PI - angle);
    const large = angle > Math.PI/2 ? 1 : 0;
    return `M ${28-r} 28 A ${r} ${r} 0 ${large} 1 ${x} ${y}`;
  };
  return html`
    <div style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
      <svg width="56" height="30" viewBox="0 0 56 30">
        <path d=${arc(1, 22)} fill="none" stroke="#1e2230" stroke-width="5" stroke-linecap="round"/>
        <path d=${arc(prob, 22)} fill="none" stroke=${color} stroke-width="5" stroke-linecap="round"/>
        <text x="28" y="26" text-anchor="middle" font-size="9" font-family="monospace" fill=${color} font-weight="700">${pct}%</text>
      </svg>
      <div style=${{fontSize:8,color:"#6b7280",fontFamily:"monospace",textAlign:"center",maxWidth:100,lineHeight:1.3}}>${note}</div>
    </div>`;
}

function CongressTimeline({allMembers, polyData, racesData}) {
  // Use live races from data.json if available, fall back to hardcoded
  const liveRaces = (racesData && racesData.length > 0) ? racesData : KEY_RACES_2026;
  const [hoveredBar, setHoveredBar] = useState(null);
  const [showProjection, setShowProjection] = useState(true);

  // Compute live 119th counts from current members
  const liveHardD = allMembers.filter(m=>m.antiArms&&m.party!=="R"&&m.antiArmsLevel==="hard").length;
  const liveSoftD = allMembers.filter(m=>m.antiArms&&m.party!=="R"&&m.antiArmsLevel!=="soft"&&m.antiArmsLevel!=="hard").length
                  + allMembers.filter(m=>m.antiArms&&m.party!=="R"&&m.antiArmsLevel==="soft").length;
  const liveHardR = allMembers.filter(m=>m.antiArms&&m.party==="R"&&m.antiArmsLevel==="hard").length;
  const liveSoftR = allMembers.filter(m=>m.antiArms&&m.party==="R"&&m.antiArmsLevel!=="hard").length;

  // Compute 120th projection from key races + stable incumbents
  // Start from 119th; apply adjustments from KEY_RACES_2026
  const stableIncumbents119 = allMembers.filter(m => {
    if (!m.antiArms) return false;
    const race = KEY_RACES_2026.find(r => r.name === m.name);
    if (race?.departing) return false;   // definitely leaving
    if (race) return false;              // has a race card — handled separately
    return true;  // no specific race — assume 0.88 retention
  });
  const stableRetained = stableIncumbents119.length * 0.88;

  let proj120HardD = stableIncumbents119.filter(m=>m.antiArms&&m.party!=="R"&&m.antiArmsLevel==="hard").length * 0.88;
  let proj120SoftD = stableIncumbents119.filter(m=>m.antiArms&&m.party!=="R"&&m.antiArmsLevel!=="hard").length * 0.88;
  let proj120HardR = stableIncumbents119.filter(m=>m.antiArms&&m.party==="R"&&m.antiArmsLevel==="hard").length * 0.88;
  let proj120SoftR = stableIncumbents119.filter(m=>m.antiArms&&m.party==="R"&&m.antiArmsLevel!=="hard").length * 0.88;

  // Add key race contributions
  KEY_RACES_2026.forEach(race => {
    if (race.departing || race.impactDir <= 0 || race.winProb === null) return;
    const p = race.winProb;
    if (race.party === "R") {
      if (race.level === "hard") proj120HardR += p;
      else proj120SoftR += p;
    } else {
      if (race.level === "hard") proj120HardD += p;
      else proj120SoftD += p;
    }
  });

  // Round for display
  const p20 = {
    hardD: Math.round(proj120HardD),
    softD: Math.round(proj120SoftD),
    hardR: Math.round(proj120HardR),
    softR: Math.round(proj120SoftR),
  };
  p20.total = p20.hardD + p20.softD + p20.hardR + p20.softR;

  const data = CONGRESS_HISTORY.map(d => {
    if (d.isLive) return {...d, hardD:liveHardD, softD:liveSoftD, hardR:liveHardR, softR:liveSoftR, total:liveHardD+liveSoftD+liveHardR+liveSoftR};
    if (d.isProjected) return {...d, ...p20};
    return d;
  }).filter(d => showProjection || !d.isProjected);

  const maxTotal = Math.max(...data.map(d => (d.hardD||0)+(d.softD||0)+(d.hardR||0)+(d.softR||0))) * 1.15 || 60;
  const chartH = 180, chartW = 460, padL=40, padB=30, padT=14, padR=16;
  const innerW = chartW - padL - padR;
  const innerH = chartH - padT - padB;
  const barW = Math.min(52, (innerW / data.length) * 0.65);
  const gap   = innerW / data.length;

  const yScale = v => innerH - (v / maxTotal) * innerH;
  const bars = [
    {key:"hardD", color:"#7c3aed", label:"Hard-D"},
    {key:"softD", color:"#818cf8", label:"Soft-D"},
    {key:"hardR", color:"#c026d3", label:"Hard-R"},
    {key:"softR", color:"#a855f7", label:"Soft-R"},
  ];

  const hov = hoveredBar !== null ? data[hoveredBar] : null;

  return html`
    <div style=${{background:"#0f1117",border:"1px solid #1a1d27",borderRadius:13,padding:"14px 16px",width:"100%",maxWidth:610}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:6}}>
        <div>
          <div style=${{fontSize:11,fontWeight:700,color:"#f0ebe0",fontFamily:"monospace",marginBottom:2}}>
            Anti-Arms Congress Over Time
          </div>
          <div style=${{fontSize:8,color:"#4b5563",fontFamily:"monospace"}}>
            115th Congress (2017) → projected 120th (2027)
          </div>
        </div>
        <div style=${{display:"flex",gap:4,flexWrap:"wrap"}}>
          ${bars.map(b=>html`
            <span key=${b.key} style=${{display:"inline-flex",alignItems:"center",gap:3,fontSize:8,color:b.color,fontFamily:"monospace"}}>
              <span style=${{width:8,height:8,borderRadius:2,background:b.color,display:"inline-block"}}/>
              ${b.label}
            </span>`)}
          <button onClick=${()=>setShowProjection(v=>!v)}
            style=${{marginLeft:4,padding:"1px 6px",borderRadius:4,border:"1px solid #1e2230",background:"transparent",
              color:showProjection?"#a5b4fc":"#374151",fontFamily:"monospace",fontSize:8,cursor:"pointer"}}>
            ${showProjection?"Hide 120th":"Show 120th"}
          </button>
        </div>
      </div>

      <!-- SVG Bar Chart -->
      <div style=${{overflowX:"auto"}}>
        <svg width=${chartW} height=${chartH} viewBox=${"0 0 "+chartW+" "+chartH} style=${{fontFamily:"monospace",display:"block",maxWidth:"100%"}}>
          <!-- Y gridlines -->
          ${[0,10,20,30,40,50].filter(v=>v<=maxTotal*1.05).map(v=>html`
            <g key=${v}>
              <line x1=${padL} y1=${padT+yScale(v)} x2=${chartW-padR} y2=${padT+yScale(v)}
                stroke="#1e2230" stroke-width="1" stroke-dasharray=${v===0?"":"3,3"}/>
              <text x=${padL-4} y=${padT+yScale(v)+3} text-anchor="end" font-size="7" fill="#374151">${v}</text>
            </g>`)}

          <!-- Bars -->
          ${data.map((d,i)=>{
            const cx = padL + i*gap + gap/2;
            const x  = cx - barW/2;
            const isProj = d.isProjected;
            const isLive = d.isLive;
            const totals = bars.map(b=>d[b.key]||0);
            let cumY = innerH;
            return html`<g key=${i}
              onMouseEnter=${()=>setHoveredBar(i)}
              onMouseLeave=${()=>setHoveredBar(null)}
              style=${{cursor:"pointer"}}
            >
              ${bars.map((b,bi)=>{
                const val = d[b.key]||0;
                const h   = (val/maxTotal)*innerH;
                const y   = padT + cumY - h;
                cumY -= h;
                if (!h) return null;
                return html`<rect key=${bi} x=${x} y=${y} width=${barW} height=${h}
                  fill=${b.color} opacity=${isProj?0.45:isLive?1:0.75}
                  stroke=${isProj?"#a5b4fc":"none"} stroke-width=${isProj?"1":"0"}
                  stroke-dasharray=${isProj?"4,3":""}
                  rx="2"
                  style=${{transition:"opacity .15s"}}/>`;
              })}
              <!-- Total label -->
              <text x=${cx} y=${padT+yScale((d.hardD||0)+(d.softD||0)+(d.hardR||0)+(d.softR||0))-5}
                text-anchor="middle" font-size="8" fill=${isProj?"#a5b4fc":isLive?"#f0ebe0":"#9ca3af"} font-weight=${isLive?"700":"400"}>
                ${(d.hardD||0)+(d.softD||0)+(d.hardR||0)+(d.softR||0)}${isProj?"*":""}
              </text>
              <!-- Congress label -->
              <text x=${cx} y=${chartH-padB+12} text-anchor="middle" font-size="8"
                fill=${isProj?"#a5b4fc":isLive?"#f0ebe0":"#6b7280"}>
                ${d.congress.replace("th","")}th
              </text>
              <text x=${cx} y=${chartH-padB+22} text-anchor="middle" font-size="6.5" fill="#374151">
                ${d.years}
              </text>
              <!-- Live / Projected badge -->
              ${isLive ? html`<text x=${cx} y=${chartH-padB+32} text-anchor="middle" font-size="6" fill="#4ade80">LIVE</text>` : null}
              ${isProj ? html`<text x=${cx} y=${chartH-padB+32} text-anchor="middle" font-size="6" fill="#a5b4fc">PROJ.</text>` : null}
            </g>`;
          })}
        </svg>
      </div>

      <!-- Hover tooltip -->
      ${hov ? html`
        <div style=${{background:"#161920",border:"1px solid #1e2230",borderRadius:7,padding:"8px 10px",
          marginTop:6,fontSize:8,fontFamily:"monospace",color:"#9ca3af",lineHeight:1.7}}>
          <span style=${{color:"#f0ebe0",fontWeight:700}}>${hov.congress} Congress ${hov.years}</span>
          ${hov.isProjected?" — PROJECTED (expected value)":hov.isLive?" — LIVE (current 119th)":""}<br/>
          <span style=${{color:"#7c3aed"}}>Hard-D: ${hov.hardD||0}</span>
          · <span style=${{color:"#818cf8"}}>Soft-D: ${hov.softD||0}</span>
          · <span style=${{color:"#c026d3"}}>Hard-R: ${hov.hardR||0}</span>
          · <span style=${{color:"#a855f7"}}>Soft-R: ${hov.softR||0}</span>
          · Total: ${(hov.hardD||0)+(hov.softD||0)+(hov.hardR||0)+(hov.softR||0)}${hov.isProjected?"*":""}<br/>
          ${hov.note}
          ${hov.isProjected?html`<br/><span style=${{color:"#374151"}}>*Expected value based on win probabilities. Individual race outcomes will shift final count.</span>`:""}
        </div>` : null}

      <!-- Arrow annotation showing growth -->
      <div style=${{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:8,fontSize:8,color:"#374151",fontFamily:"monospace"}}>
        <span style=${{color:"#7c3aed"}}>2 members (2017)</span>
        <span style=${{letterSpacing:"0.2em"}}>→</span>
        <span style=${{color:"#4ade80",fontWeight:700}}>${liveHardD+liveSoftD+liveHardR+liveSoftR} members (live)</span>
        <span style=${{letterSpacing:"0.2em"}}>→</span>
        <span style=${{color:"#a5b4fc"}}>${p20.total} projected (2027)</span>
        <span style=${{color:"#1e2230"}}>·</span>
        <span style=${{color:"#374151"}}>${Math.round(((liveHardD+liveSoftD+liveHardR+liveSoftR)/2 - 1)*100)}× growth since 115th</span>
      </div>
    </div>

    <!-- Key 2026 Races heading -->
    <div style=${{width:"100%",maxWidth:610,marginTop:14}}>
      <div style=${{fontSize:10,fontFamily:"monospace",color:"#6b7280",marginBottom:8,letterSpacing:"0.12em",textTransform:"uppercase"}}>
        Key 2026 Races
        <span style=${{color:"#374151",fontWeight:400,letterSpacing:"normal",textTransform:"none",marginLeft:8}}>
          — click any card for details
        </span>
      </div>
      <div style=${{display:"flex",flexWrap:"wrap",gap:7}}>
        ${liveRaces.map(race=>html`
          <${RaceCard} key=${race.name} race=${race} liveMembers=${allMembers}/>`)}
      </div>
      <div style=${{marginTop:8,fontSize:8,color:"#374151",fontFamily:"monospace",lineHeight:1.8}}>
        Win probabilities sourced from Polymarket where available, Cook Political Report ratings, and polling data.
        120th projection = expected value (Σ win_prob × seat_value). Actual outcome will vary.
      </div>
    </div>`;
}

function App() {
  const [chamber,  setChamber]  = useState("house");
  const [selected, setSelected] = useState(null);
  const [hovered,  setHovered]  = useState(null);
  const [showAnti, setShowAnti] = useState(false);
  const [hardOnly, setHardOnly] = useState(false);
  const [showTimeline, setShowTimeline] = useState(false);

  const {allMembers, bills, challengers, history, races, fecData, polyData, fetchedAt, status, loaded} = useData();
  const members = useMemo(() => buildMembers(allMembers, chamber), [allMembers, chamber]);

  // URL deep-link (mount only)
  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    if (p.get("chamber")==="senate") setChamber("senate");
    const mName = p.get("member");
    if (mName) {
      const idx = members.findIndex(m=>m.name===mName);
      if (idx>=0) setSelected(idx);
    }
  }, []);

  useEffect(() => {
    const p = new URLSearchParams();
    if (chamber!=="house") p.set("chamber",chamber);
    if (selected!==null&&members[selected]?.name&&!members[selected]._filler)
      p.set("member",members[selected].name);
    const qs=p.toString();
    window.history.replaceState(null,"",qs?"?"+qs:window.location.pathname);
  }, [selected, chamber, members]);

  const svgW=610, svgH=300, cx=svgW/2, cy=svgH-14;
  const cfg = chamber==="house" ? {innerR:50,spacing:20,rows:9} : {innerR:78,spacing:30,rows:6};
  const positions = useMemo(()=>computeHemicycle(members.length,cx,cy,cfg.innerR,cfg.spacing,cfg.rows),
    [members.length,cx,cy,cfg.innerR,cfg.spacing,cfg.rows]);

  const dotR      = chamber==="house" ? 4.5 : 6.5;
  const selMember = selected!==null ? members[selected] : null;
  const ch        = chamber==="house" ? "house" : "senate";
  const sideR     = allMembers.filter(m=>m.antiArms&&m.party==="R"&&m.chamber===ch);
  const sideD     = allMembers.filter(m=>m.antiArms&&m.party!=="R"&&m.chamber===ch);
  const challR    = challengers.filter(c=>c.party==="R"&&c.chamber===ch);
  const challD    = challengers.filter(c=>c.party!=="R"&&c.chamber===ch);

  const totalAnti = members.filter(m=>m.antiArms).length;
  const totalHard = members.filter(m=>m.antiArmsLevel==="hard").length;
  const totalSoft = totalAnti - totalHard;

  if (!loaded) return html`
    <div style=${{minHeight:"100vh",background:"#0a0c10",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style=${{textAlign:"center",fontFamily:"monospace",color:"#374151",fontSize:10}}>
        <div style=${{fontSize:22,marginBottom:10,opacity:.2}}>◈</div>
        ${status}
      </div>
    </div>`;

  if (loaded && allMembers.length===0) return html`
    <div style=${{minHeight:"100vh",background:"#0a0c10",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style=${{textAlign:"center",fontFamily:"monospace",maxWidth:420}}>
        <div style=${{fontSize:22,marginBottom:10,opacity:.2}}>◈</div>
        <div style=${{color:"#fbbf24",marginBottom:8,fontSize:11}}>data.json loaded but contains no members yet.</div>
        <div style=${{color:"#374151",fontSize:9,lineHeight:1.8}}>
          Go to your GitHub repo → Actions → Refresh Data → Run workflow.<br/>
          The first run populates member data from TrackAIPAC. It takes ~2 minutes.
        </div>
        <button onClick=${()=>window.location.reload()}
          style=${{marginTop:14,padding:"6px 16px",borderRadius:7,border:"none",
            background:"#fbbf24",color:"#0a0c10",fontFamily:"monospace",fontSize:10,
            fontWeight:700,cursor:"pointer"}}>
          Reload page
        </button>
      </div>
    </div>`;

  return html`
    <div style=${{minHeight:"100vh",background:"#0a0c10",display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 10px"}}>

      <div style=${{textAlign:"center",marginBottom:10}}>
        <div style=${{fontSize:8,letterSpacing:"0.22em",textTransform:"uppercase",color:"#374151",fontFamily:"monospace",marginBottom:3}}>
          119TH UNITED STATES CONGRESS · 2025–2026
        </div>
        <h1 style=${{fontSize:19,fontWeight:700,margin:"0 0 2px",letterSpacing:"-0.02em",color:"#f0ebe0"}}>
          Anti-Arms Congress Tracker
        </h1>
        <div style=${{fontSize:9,color:"#6b7280",display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",alignItems:"center"}}>
          <span style=${{fontFamily:"monospace",color:"#6b7280",fontSize:8}}>${status}</span>
          ${fetchedAt?html`<span style=${{fontFamily:"monospace",color:"#374151",fontSize:8}}>
            · ${new Date(fetchedAt).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
          </span>`:null}
        </div>
      </div>

      <!-- Chamber toggle -->
      <div style=${{display:"flex",gap:2,background:"#161920",borderRadius:10,padding:3,marginBottom:9,border:"1px solid #1e2230"}}>
        ${["house","senate"].map(c=>html`
          <button key=${c} onClick=${()=>{setChamber(c);setSelected(null);setShowTimeline(false);}}
            style=${{padding:"5px 15px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:10,
              letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,
              background:chamber===c?"#f0ebe0":"transparent",color:chamber===c?"#0a0c10":"#6b7280"}}>
            ${c==="senate"?"Senate · 100":"House · 435"}
          </button>`)}
        <button onClick=${()=>setShowTimeline(v=>!v)}
          style=${{padding:"5px 15px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:10,
            letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,
            background:showTimeline?"#1a0a2e":"transparent",
            color:showTimeline?"#a5b4fc":"#6b7280",
            borderLeft:"1px solid #1e2230"}}>
          📈 Timeline
        </button>
      </div>

      <!-- Legend + stat pills -->
      <div style=${{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",marginBottom:7}}>
        ${[
          {c:"#991b1b", bg:"rgba(153,27,27,.1)",  l:"Rep",       n:members.filter(m=>m.party==="R"&&!m.antiArms).length},
          {c:"#a855f7", bg:"rgba(168,85,247,.1)",  l:"Soft Anti-R",n:members.filter(m=>m.antiArms&&m.party==="R"&&m.antiArmsLevel!=="hard").length},
          {c:"#c026d3", bg:"rgba(192,38,211,.12)", l:"Hard Anti-R",n:members.filter(m=>m.antiArms&&m.party==="R"&&m.antiArmsLevel==="hard").length},
          {c:"#7c3aed", bg:"rgba(124,58,237,.1)",  l:"Hard Anti-D",n:members.filter(m=>m.antiArms&&m.party!=="R"&&m.antiArmsLevel==="hard").length},
          {c:"#818cf8", bg:"rgba(129,140,248,.1)", l:"Soft Anti-D",n:members.filter(m=>m.antiArms&&m.party!=="R"&&m.antiArmsLevel!=="hard").length},
          {c:"#1e40af", bg:"rgba(30,64,175,.1)",   l:"Dem",       n:members.filter(m=>m.party==="D"&&!m.antiArms).length},
        ].map(b=>html`
          <span key=${b.l} style=${{display:"inline-flex",alignItems:"center",gap:4,background:b.bg,border:"1px solid "+b.c+"30",borderRadius:5,padding:"2px 7px",fontSize:9,fontFamily:"monospace",color:b.c}}>
            <span style=${{width:5,height:5,borderRadius:"50%",background:b.c,display:"inline-block"}}/>
            ${b.l+" "+b.n}
          </span>`)}
        <button onClick=${()=>setShowAnti(v=>!v)}
          style=${{padding:"2px 7px",borderRadius:5,border:"1px solid #7c3aed33",background:showAnti?"#7c3aed1a":"transparent",color:showAnti?"#c084fc":"#4b5563",fontFamily:"monospace",fontSize:9,cursor:"pointer"}}>
          ${showAnti?"Show all":"Highlight anti-arms"}
        </button>
        <button onClick=${()=>setHardOnly(v=>!v)}
          style=${{padding:"2px 7px",borderRadius:5,border:"1px solid #c026d333",background:hardOnly?"#c026d31a":"transparent",color:hardOnly?"#e879f9":"#4b5563",fontFamily:"monospace",fontSize:9,cursor:"pointer"}}>
          ${hardOnly?"Show all":"Hard only"}
        </button>
      </div>

      <!-- Three columns / Timeline toggle -->
      ${showTimeline ? html`
        <div style=${{width:"100%",maxWidth:860,display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
          <${CongressTimeline} allMembers=${allMembers} polyData=${polyData} racesData=${races}/>
        </div>`
      : html`
      <div class="three-col" style=${{display:"flex",gap:10,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"center",width:"100%",maxWidth:1080}}>

        <${MemberBox} title="Anti-Arms Republicans" color="#a855f7"
          members=${sideR} challengers=${challR}
          fecData=${fecData} polyData=${polyData}
          onSelect=${m=>setSelected(members.findIndex(x=>x.name===m.name))}/>

        <div class="ctr-col" style=${{display:"flex",flexDirection:"column",gap:7,alignItems:"center",flex:1,minWidth:0}}>

          <!-- Hemicycle SVG -->
          <div style=${{background:"#0f1117",border:"1px solid #1a1d27",borderRadius:13,overflow:"hidden",width:"100%",maxWidth:610}}>
            <svg class="hemi" width=${svgW} height=${svgH} viewBox=${"0 0 "+svgW+" "+svgH} style=${{display:"block",width:"100%",height:"auto"}}>
              ${Array.from({length:cfg.rows}).map((_,i)=>{
                const r=cfg.innerR+i*cfg.spacing;
                return html`<path key=${i} d=${"M "+(cx-r)+" "+cy+" A "+r+" "+r+" 0 0 1 "+(cx+r)+" "+cy} fill="none" stroke="#111419" stroke-width="1"/>`;
              })}
              ${positions.map((pos,i)=>{
                const m=members[i]; if(!m) return null;
                const isHard = m.antiArmsLevel==="hard";
                const dimDot = (showAnti&&!m.antiArms) || (hardOnly&&(!m.antiArms||!isHard));
                const isSel=selected===i, isHov=hovered===i;
                const color=dotColor(m), poly=polyData[m.name], atRisk=poly&&poly.prob<0.65;
                const r=isHov?dotR+1.5:dotR;
                return html`<g key=${i}>
                  ${isSel?html`<circle cx=${pos.x} cy=${pos.y} r=${dotR+4.5} fill="none" stroke=${color} stroke-width="1.5" opacity=".35"/>`:null}
                  ${isHard&&m.antiArms&&!dimDot?html`<circle cx=${pos.x} cy=${pos.y} r=${dotR+3.5} fill="none" stroke=${color} stroke-width="1" opacity=".25"/>`:null}
                  ${m.antiArms&&!isHard&&!dimDot?html`<circle cx=${pos.x} cy=${pos.y} r=${dotR+2} fill="none" stroke=${color} stroke-width=".6" opacity=".15"/>`:null}
                  ${atRisk&&!dimDot?html`<circle cx=${pos.x} cy=${pos.y} r=${dotR+2.5} fill="none" stroke="#fbbf24" stroke-width="1" opacity=".35" stroke-dasharray="2,2"/>`:null}
                  <circle cx=${pos.x} cy=${pos.y} r=${r}
                    fill=${dimDot?"#111419":color} opacity=${dimDot?.07:1}
                    stroke=${isSel?"#fff":"none"} stroke-width="1.5"
                    style=${{cursor:m._filler?"default":"pointer",transition:"r 0.1s"}}
                    onClick=${()=>!m._filler&&setSelected(selected===i?null:i)}
                    onMouseEnter=${()=>!m._filler&&setHovered(i)}
                    onMouseLeave=${()=>setHovered(null)}/>
                </g>`;
              })}
              <line x1=${cx} y1=${cy} x2=${cx} y2=${cy-(cfg.innerR+(cfg.rows-1)*cfg.spacing)-16} stroke="#1e2230" stroke-width="1" stroke-dasharray="3,3"/>
              <text x=${cx-80} y="11" fill="#991b1b" font-size="7" font-family="monospace" text-anchor="middle" opacity=".5">R</text>
              <text x=${cx-52} y="11" fill="#a855f7" font-size="6" font-family="monospace" text-anchor="middle" opacity=".6">Soft-R</text>
              <text x=${cx-22} y="11" fill="#c026d3" font-size="6" font-family="monospace" text-anchor="middle" opacity=".7">Hard-R</text>
              <text x=${cx+22} y="11" fill="#7c3aed" font-size="6" font-family="monospace" text-anchor="middle" opacity=".7">Hard-D</text>
              <text x=${cx+52} y="11" fill="#818cf8" font-size="6" font-family="monospace" text-anchor="middle" opacity=".6">Soft-D</text>
              <text x=${cx+80} y="11" fill="#1e40af" font-size="7" font-family="monospace" text-anchor="middle" opacity=".5">D</text>
              <ellipse cx=${cx} cy=${cy+6} rx="18" ry="6" fill="#0f1117"/>
              <rect x=${cx-3} y=${cy-7} width="6" height="13" fill="#0f1117" rx="2"/>
            </svg>
          </div>

          <!-- Detail panel -->
          <div style=${{width:"100%",maxWidth:610,background:"#0f1117",border:"1px solid #1a1d27",borderRadius:11,padding:"10px 13px",minHeight:70}}>
            <${DetailPanel} member=${selMember} fecData=${fecData} polyData=${polyData} bills=${bills} chamber=${chamber}/>
          </div>

          <!-- Progress bars -->
          <div style=${{width:"100%",maxWidth:610}}>
            <${ProgressBars} chamber=${chamber} members=${members}/>
          </div>

          <!-- Legislation -->
          <div style=${{width:"100%",maxWidth:610}}>
            <${BillsPanel} bills=${bills}/>
          </div>

          <!-- History -->
          <div style=${{width:"100%",maxWidth:610}}>
            <${HistoryTimeline} history=${history}/>
          </div>

          <!-- Find My Rep -->
          <div style=${{width:"100%",maxWidth:610}}>
            <${FindMyRep} members=${members} onHighlight=${setSelected}/>
          </div>
        </div>

        <${MemberBox} title="Anti-Arms Democrats" color="#7c3aed"
          members=${sideD} challengers=${challD}
          fecData=${fecData} polyData=${polyData}
          onSelect=${m=>setSelected(members.findIndex(x=>x.name===m.name))}/>

      </div>

      `}

      <div style=${{fontSize:8,color:"#1a1d27",marginTop:14,fontFamily:"monospace",textAlign:"center",maxWidth:800,lineHeight:1.8}}>
        MEMBERS: TRACKAIPAC.COM (D/I) + RLC LIBERTY INDEX (R) · HARD: CONGRESS.GOV BILL CO-SPONSORSHIP + HOUSE-VOTE API + LEGISCAN
        <br/>FINANCE: OPENFEC · ODDS: POLYMARKET · REPS: GOOGLE CIVIC · P2P: GUN.JS · REFRESH: 4H GITHUB ACTIONS
        <br/><a href="https://github.com/LukeRDavis/Anti-Arms-Congress-Tracker" target="_blank" style=${{color:"#374151"}}>github.com/LukeRDavis/Anti-Arms-Congress-Tracker</a>
      </div>
    </div>`;
}

render(html`<${App}/>`, document.getElementById("app"));
</script>
</body>
</html>
