name: Refresh Data

on:
  schedule:
    # Every 4 hours — adjust as needed (cron UTC)
    - cron: "0 */4 * * *"
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch API data
        env:
          FEC_KEY:  ${{ secrets.FEC_KEY }}
          POLY_KEY: ${{ secrets.POLY_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: refresh data.json [skip ci]"
          git push
