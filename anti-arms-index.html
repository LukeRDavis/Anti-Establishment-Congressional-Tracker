// Central odds validation — call instead of raw polyData[name] everywhere.
// races is optional; pass it when available for election-year gating.
function getValidatedPoly(member, polyData, races) {
  if (!member || !polyData) return null;
  const pd = polyData[member.name];
  if (!pd || pd.prob == null) return null;
  const q   = (pd.question || "").toLowerCase();
  const src = pd.src || "";

  // 1. Disqualified market topics
  if (MARKET_DISQUALIFY.some(b => q.includes(b))) return null;

  // 2. Wrong election year (past or future cycle)
  if (/20(2[0-4]|2[7-9]|3\d)/.test(q)) return null;

  // 3. Last name must appear as a WHOLE WORD in the question
  //    (substring check caused "Roy" to match "Royce", etc.)
  //    Skip this check for predictit_contract whose questions are market-level
  //    (shared across multiple candidates — no individual name in text).
  if (src !== "predictit_contract") {
    const last = member.name.split(" ").pop().toLowerCase();
    if (last.length > 1) {
      const wordRe = new RegExp("(?:^|[^a-z])" + last + "(?:[^a-z]|$)");
      if (!wordRe.test(q)) return null;
    }
  }

  // 4. Departed / not-running members — suppress odds entirely
  if (["RETIRING", "RESIGNED", "RETIRED", "FLIPPED"].includes(member.ps)) return null;

  // 5. Not on this cycle's ballot: race entry exists but has no election dates
  //    (e.g. Rand Paul — Senate class 3, up 2028, not 2026)
  //    Hide until Jan 1 of the year their actual race begins.
  if (races) {
    const race = races.find(r => r.name === member.name);
    if (race && !race.primary_date && !race.general_date && src !== "grok_estimate") {
      return null;
    }
  }

  return pd;
}

function computeHemicycle(allMembers, chamber, cx, cy) {
  const ch = chamber === "senate" ? "senate" : "house";

  const active = allMembers.filter(m =>
    m.chamber === ch &&
    !["RETIRED","RESIGNED","DEFEATED","RETIRING","FAILED_PRIMARY"].includes(m.ps)
  );

  const antiR    = active.filter(m =>  m.antiArms && m.party === "R");
  const antiD    = active.filter(m =>  m.antiArms && m.party !== "R");
  const restR    = active.filter(m => !m.antiArms && m.party === "R");
  const restD    = active.filter(m => !m.antiArms && m.party === "D");
  const restOther= active.filter(m => !m.antiArms && m.party !== "R" && m.party !== "D");
  const antiCount= antiR.length + antiD.length;
  const filler   = {_filler:true, antiArms:false, party:"", name:""};

  // ── Best-practice geometry (parliamentarch algorithm) ────────────────────
  // innerR and nRows fixed per chamber for stable visual; rowCounts derived
  // proportionally to arc circumference so outer rows have more seats.
  const innerR  = ch === "senate" ? 80 : 52;
  const nRows   = ch === "senate" ? 4  : 9;
  const spacing = ch === "senate" ? 28 : 22;
  const nSeats  = ch === "senate" ? 100 : 435;

  // Row radii
  const radii = Array.from({length:nRows}, (_,i) => innerR + i * spacing);

  // Seats per row proportional to circumference (r × π) so density is uniform.
  // Then scale so sum == nSeats.
  const rawCounts = radii.map(r => r * Math.PI);
  const rawSum    = rawCounts.reduce((s,v) => s+v, 0);
  let rowCounts   = rawCounts.map(v => Math.round(v / rawSum * nSeats));

  // Correction: adjust largest row up/down until sum matches exactly
  let total = rowCounts.reduce((s,v) => s+v, 0);
  let adj = nSeats - total;
  // distribute correction across the largest rows first
  const order = rowCounts.map((_,i) => i).sort((a,b) => rowCounts[b]-rowCounts[a]);
  for (let k = 0; k < Math.abs(adj); k++) {
    const idx = order[k % order.length];
    rowCounts[idx] += adj > 0 ? 1 : -1;
  }
  total = rowCounts.reduce((s,v) => s+v, 0);

  // ── Per-row allocation: [antiD | restD | restR | antiR] ─────────────────
  // Anti-establishment members sit at the OUTER EDGE of their own party's side:
  // Anti-D far left, regular D inner-left, regular R inner-right, Anti-R far right.
  // Each group gets seats proportional to its share of total, with a correction
  // loop so each group sums to exactly its real count.
  const nAntiD = antiD.length, nAntiR = antiR.length;
  const nRestD = restD.length + restOther.length, nRestR = restR.length;

  function allocGroup(groupSize, rowCount, rowTotal) {
    return Math.round(groupSize * rowCount / rowTotal);
  }
  function correctionPass(perRow, target) {
    let diff = target - perRow.reduce((s,v) => s+v, 0);
    for (let i = perRow.length-1; i >= 0 && diff !== 0; i--) {
      if (diff > 0) { perRow[i]++; diff--; }
      else if (perRow[i] > 0) { perRow[i]--; diff++; }
    }
  }

  const antiDPerRow = rowCounts.map(c => allocGroup(nAntiD, c, total));
  const restDPerRow = rowCounts.map(c => allocGroup(nRestD, c, total));
  const restRPerRow = rowCounts.map(c => allocGroup(nRestR, c, total));
  const antiRPerRow = rowCounts.map(c => allocGroup(nAntiR, c, total));
  correctionPass(antiDPerRow, nAntiD);
  correctionPass(restDPerRow, nRestD);
  correctionPass(restRPerRow, nRestR);
  correctionPass(antiRPerRow, nAntiR);

  let antiDq = [...antiD], restDq = [...restD, ...restOther];
  let restRq = [...restR],  antiRq = [...antiR];

  const result = [];
  for (let ri = 0; ri < nRows; ri++) {
    const count = rowCounts[ri];
    const r     = radii[ri];

    // Build row left→right: antiD | restD | restR | antiR
    const row = [];
    const aDn = antiDPerRow[ri], rDn = restDPerRow[ri];
    const rRn = restRPerRow[ri], aRn = antiRPerRow[ri];

    // If row total doesn't match due to rounding, pad/trim restD (largest group)
    const rowSum = aDn + rDn + rRn + aRn;
    const pad    = count - rowSum;  // usually 0, occasionally ±1

    for (let s = 0; s < aDn; s++)        row.push(antiDq.length  ? antiDq.shift()  : filler);
    for (let s = 0; s < rDn + pad; s++)  row.push(restDq.length  ? restDq.shift()  : filler);
    for (let s = 0; s < rRn; s++)        row.push(restRq.length  ? restRq.shift()  : filler);
    for (let s = 0; s < aRn; s++)        row.push(antiRq.length  ? antiRq.shift()  : filler);

    // Seat positions: equal angular spacing across the semicircle
    for (let s = 0; s < count; s++) {
      const m     = row[s] || filler;
      const angle = count === 1 ? Math.PI/2 : (Math.PI / (count - 1)) * s;
      result.push({...m, _x: cx - r * Math.cos(angle), _y: cy - r * Math.sin(angle)});
    }
  }
  return result;
}

function fmtM(n) {
  if (!n&&n!==0) return "—";
  if (n>=1e6) return "$"+(n/1e6).toFixed(1)+"M";
  if (n>=1e3) return "$"+Math.round(n/1e3)+"K";
  return "$"+n;
}

function ProgressBars({chamber, members, allMembers, challengers, racesData, polyData}) {
  const current = members.filter(m => m.antiArms).length;
  const ch = chamber;

  const races = racesData || [];

  const trials = [];

  members.filter(m => m.antiArms).forEach(m => {
    const race   = races.find(r => r.name === m.name && r.chamber === ch);
    const pm     = getValidatedPoly(m, polyData, races);
    let p;
    if (pm && pm.prob != null)              p = pm.prob;
    else if (race && race.win_prob != null) p = race.win_prob;
    else if (race && race.winProb != null)  p = race.winProb;
    else if (race && race.departing)        p = 0;
    else                                    p = 0.88;
    trials.push({name: m.name, p, src: pm ? "poly" : "est"});
  });

  const challSeen = new Set(trials.map(t => t.name.toLowerCase()));
  const allChalls = [
    ...(challengers||[]).filter(c => (c.chamber||"house") === ch),
    ...races.filter(r => r.chamber === ch && (r.type==="challenger" || r.raceType==="CHALLENGER")),
  ];
  allChalls.forEach(r => {
    const key = (r.name||"").toLowerCase();
    if (challSeen.has(key)) return;
    challSeen.add(key);
    const pm = getValidatedPoly(r, polyData, races);
    const ps = r.ps || r.status || "";
    if (["LOST","WITHDREW","DEFEATED","FAILED_PRIMARY"].includes(ps)) return;
    const p = pm && pm.prob != null ? pm.prob
            : r.win_prob != null ? r.win_prob
            : r.winProb  != null ? r.winProb
            : 0.12;  // default challenger win probability
    trials.push({name: r.name, p, src: pm ? "poly" : "est", isChallenger: true});
  });

  const mu     = trials.reduce((s,t) => s+t.p, 0);
  const sigma2 = trials.reduce((s,t) => s+t.p*(1-t.p), 0);
  const sigma  = Math.sqrt(Math.max(sigma2, 0.01));
  const challCount = trials.filter(t => t.isChallenger).length;
  const polyCount  = trials.filter(t => t.src === "poly").length;

  function normCDF(z) {
    if (z>6) return 1; if (z<-6) return 0;
    const t = 1/(1+0.2315419*Math.abs(z));
    const d = 0.3989423*Math.exp(-z*z/2);
    const p = d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));
    return z>0?1-p:p;
  }
  function pReach(n) {
    return Math.max(0, Math.min(1, normCDF(-(n-0.5-mu)/sigma)));
  }
  function probColor(p) {
    if (p>=0.7) return "#4ade80"; if (p>=0.4) return "#fbbf24";
    if (p>=0.15) return "#f97316"; return "#f87171";
  }
  function probLabel(p) {
    if (p>=0.85) return "Very Likely"; if (p>=0.65) return "Likely";
    if (p>=0.40) return "Possible"; if (p>=0.15) return "Unlikely";
    return "Very Unlikely";
  }

  return html`
    <div style=${{background:"#0f1117",border:"1px solid #1e2230",borderRadius:12,padding:"12px 14px",width:"100%",boxSizing:"border-box"}}>
      <div style=${{fontSize:9,color:"#a78bfa",fontFamily:FM,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:7}}>
        ◈ Anti-Intervention Coalition · ${chamber==="senate"?"Senate":"House"}
      </div>

      <div style=${{display:"flex",gap:8,marginBottom:7,flexWrap:"wrap",alignItems:"center",fontFamily:FM,fontSize:8}}>
        <span style=${{display:"flex",alignItems:"center",gap:4}}>
          <span style=${{width:9,height:9,borderRadius:2,background:"#818cf8",display:"inline-block"}}/>
          <span style=${{color:"#818cf8",fontWeight:600}}>${current} members</span>
        </span>
        ${challCount>0 ? html`
          <span style=${{color:"#4b5563"}}>+</span>
          <span style=${{color:"#a78bfa"}}>${challCount} candidates</span>` : null}
        <span style=${{color:"#4b5563"}}>·</span>
        <span style=${{color:"#374151"}}>Expected Nov 2026:
          <span style=${{color:"#a5b4fc",fontWeight:600}}> μ=${mu.toFixed(1)}</span>
          <span style=${{color:"#374151"}}> ± ${sigma.toFixed(1)}</span>
        </span>
        ${polyCount>0 ? html`<span style=${{color:"#4ade80",fontSize:7}}>◉ ${polyCount} live</span>` : null}
      </div>

      ${THRESHOLDS[chamber].map((th,i) => {
        const pct     = Math.min(100, Math.round((current/th.n)*100));
        const reached = current >= th.n;
        const prob    = pReach(th.n);
        const pc      = probColor(prob);
        const pl      = probLabel(prob);
        const need    = Math.max(0, th.n-current);
        const muPct   = Math.min(99, Math.round((mu/th.n)*100));

        return html`
          <div key=${i} style=${{marginBottom: i<THRESHOLDS[chamber].length-1?16:0}}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3,flexWrap:"wrap",gap:3}}>
              <span style=${{fontSize:10,color:reached?"#4ade80":th.color,fontWeight:600,fontFamily:FM}}>
                ${th.label}<span style=${{fontSize:9,fontWeight:400,color:"#374151"}}> / ${th.n}</span>
              </span>
              <div style=${{display:"flex",gap:5,alignItems:"center"}}>
                <span style=${{fontSize:9,fontFamily:FM,color:reached?"#4ade80":"#6b7280"}}>
                  ${current}/${th.n}${reached?" ✓":""}
                </span>
                <span style=${{fontSize:9,fontFamily:FM,fontWeight:700,
                  padding:"1px 7px",borderRadius:4,
                  background:pc+"18",color:pc,border:"1px solid "+pc+"40",
                  minWidth:44,textAlign:"center"}}>
                  ${reached?"100%":Math.round(prob*100)+"%"}
                </span>
              </div>
            </div>
            <div style=${{height:7,borderRadius:4,background:"#1a1d27",overflow:"hidden",marginBottom:4,position:"relative"}}>
              <div style=${{position:"absolute",left:0,top:0,height:"100%",
                width:pct+"%",background:reached?"#4ade80":"#818cf8",
                borderRadius:4,transition:"width 0.8s ease"}}/>
              ${!reached ? html`
                <div style=${{position:"absolute",top:0,height:"100%",width:2,
                  background:"#a5b4fc",opacity:0.5,left:muPct+"%"}}/>` : null}
            </div>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:3}}>
              <div style=${{fontSize:8,fontFamily:FM,color:pc,flex:1}}>
                ${reached
                  ? "✓ Threshold reached with current coalition"
                  : pl+" by Nov 2026 — need "+need+" more (μ="+mu.toFixed(1)+", σ="+sigma.toFixed(1)+")"}
              </div>
            </div>
            <div style=${{fontSize:9,color:"#374151",lineHeight:1.5,marginTop:2}}>${th.desc}</div>
          </div>`;
      })}

      <div style=${{marginTop:10,paddingTop:7,borderTop:"1px solid #1a1d27",
        fontSize:7,color:"#1e2230",fontFamily:FM,lineHeight:1.7}}>
        P(reach N) = Φ((μ−N+0.5)/σ). Members default retention p=0.88 · challengers default p=0.12 · Polymarket live where available.
      </div>
    </div>`;
}

                <div>

                ${rep.urls?.[0]?html`<a href=${rep.urls[0]} target="_blank" rel="noreferrer" style=${{fontSize:8,color:"#4b9cd3",fontFamily:FM,textDecoration:"none"}}>↗ Web</a>`:null}

}

function useData() {
  const [allMembers,   setMembers]   = useState([]);
  const [races,        setRaces]     = useState([]);
  const [bills,        setBills]     = useState([]);
  const [challengers,  setChalls]    = useState([]);
  const [history,      setHistory]   = useState({events:[]});
  const [fecData,      setFec]       = useState({});
  const [polyBase,     setPolyBase]  = useState({});  // data.json snapshot (has token_ids)
  const [polyLive,     setPolyLive]  = useState({});  // live CLOB prices
  const [polyUpdated,  setPolyUpd]   = useState(null);
  const [polyLoading,  setPolyLoad]  = useState(false);
  const [fetchedAt,    setFetchedAt] = useState(null);
  const [status,       setStatus]    = useState("Loading…");
  const [loaded,       setLoaded]    = useState(false);
  const [congressHistory, setCongressHistory] = useState({});

  const GAMMA = "https://gamma-api.polymarket.com";
  const CLOB  = "https://clob.polymarket.com";

  function safeFloat(v) {
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  }

  function extractYesToken(mk) {
    const tokens = mk.tokens || mk.clobTokenIds || [];
    let yes = null, no = null;
    for (const tok of tokens) {
      if (tok && typeof tok === "object") {
        const out = (tok.outcome || "").toUpperCase();
        const tid = tok.token_id || tok.tokenId || "";
        if (out === "YES") yes = tid;
        if (out === "NO")  no  = tid;
      } else if (typeof tok === "string") {
        if (!yes) yes = tok;
        else if (!no) no = tok;
      }
    }
    return {yes, no};
  }

  async function refreshPredictIt(basePolyData) {
    // PredictIt has a public REST API — no auth, no token needed.
    // Group entries by market ID, then fetch each market once.
    const piEntries = Object.entries(basePolyData).filter(
      ([,pd]) => pd.src === "predictit_contract" && pd.url && pd.url.includes("/markets/detail/")
    );
    if (!piEntries.length) return {};

    const markets = {};
    for (const [name, pd] of piEntries) {
      const m = pd.url.match(/\/markets\/detail\/(\d+)\//);
      if (!m) continue;
      if (!markets[m[1]]) markets[m[1]] = [];
      markets[m[1]].push({name, pd});
    }

    const fresh = {};
    for (const [marketId, entries] of Object.entries(markets)) {
      try {
        const r = await fetch("https://www.predictit.org/api/marketdata/markets/" + marketId);
        if (!r.ok) continue;
        const data = await r.json();
        const contracts = data.Contracts || [];
        for (const {name, pd} of entries) {
          // question format from fetch_data.py: "Market question? → Candidate Name"
          const arrow = (pd.question || "").split("→").pop().trim().toLowerCase();
          const last  = name.split(" ").pop().toLowerCase();
          const first = name.split(" ")[0].toLowerCase();
          const contract = contracts.find(c => {
            const cn = (c.Name || c.ShortName || "").toLowerCase();
            return arrow ? cn.includes(arrow.split(" ").pop()) :
                           (cn.includes(last) || cn.includes(first));
          }) || (contracts.length === 1 ? contracts[0] : null);
          if (!contract) continue;
          // BestYesPrice = current market best ask; LastTradePrice = last trade
          const price = parseFloat(contract.BestYesPrice ?? contract.LastTradePrice ?? "");
          if (isNaN(price) || price < 0 || price > 1) continue;
          fresh[name] = {
            ...pd,
            prob:       price,
            src:        "predictit_contract",
            fetched_at: new Date().toISOString(),
          };
        }
      } catch {}
      await new Promise(r => setTimeout(r, 200));
    }
    if (Object.keys(fresh).length > 0)
      console.log("PredictIt refresh: " + Object.keys(fresh).length + "/" + piEntries.length + " updated");
    return fresh;
  }

  async function batchRefreshCLOB(basePolyData) {
    const tokenMap = {};  // token_id → candidate name
    for (const [name, pd] of Object.entries(basePolyData)) {
      if (pd.token_id) tokenMap[pd.token_id] = name;
    }
    const tokenIds = Object.keys(tokenMap);
    if (tokenIds.length === 0) return {};

    const fresh = {};
    try {
      const qs = tokenIds.map(id => "token_ids=" + encodeURIComponent(id)).join("&");
      const r  = await fetch(CLOB + "/midpoints?" + qs);
      if (r.ok) {
        const data = await r.json();
        const items = Array.isArray(data) ? data : (data.results || data.midpoints || []);
        for (const item of items) {
          const tid  = item.token_id || item.tokenId;
          const mid  = safeFloat(item.mid || item.price);
          const name = tokenMap[tid];
          if (name && mid !== null && mid >= 0 && mid <= 1) {
            fresh[name] = {
              ...basePolyData[name],
              prob:       mid,
              src:        "polymarket_live",
              fetched_at: new Date().toISOString(),
            };
          }
        }
        if (Object.keys(fresh).length > 0) {
          console.log("Poly batch CLOB: " + Object.keys(fresh).length + "/" + tokenIds.length + " refreshed");
          return fresh;
        }
      }
    } catch (e) {
      console.warn("Poly batch failed, falling back to individual:", e);
    }

    const chunkSize = 8;
    for (let i = 0; i < tokenIds.length; i += chunkSize) {
      const chunk = tokenIds.slice(i, i + chunkSize);
      await Promise.all(chunk.map(async tid => {
        try {
          const r = await fetch(CLOB + "/midpoint?token_id=" + encodeURIComponent(tid));
          if (!r.ok) return;
          const d   = await r.json();
          const mid = safeFloat(d.mid || d.price);
          const name = tokenMap[tid];
          if (name && mid !== null && mid >= 0 && mid <= 1) {
            fresh[name] = {
              ...basePolyData[name],
              prob:       mid,
              src:        "polymarket_live",
              fetched_at: new Date().toISOString(),
            };
          }
        } catch {}
      }));
      if (i + chunkSize < tokenIds.length) {
        await new Promise(r => setTimeout(r, 100));
      }
    }
    console.log("Poly individual CLOB: " + Object.keys(fresh).length + " refreshed");
    return fresh;
  }

  async function searchGammaForNew(memberList, racesList, existingPoly) {
    function validateMarket(title, name, info) {
      const t = title.toLowerCase();
      const parts = name.split(" ");
      const first = parts[0].toLowerCase();
      const last  = parts[parts.length - 1].toLowerCase();
      const state = (info.state || "").toLowerCase();
      const chamber = info.chamber || "house";

      for (const bad of MARKET_DISQUALIFY) {
        if (t.includes(bad)) return false;
      }
      if (/2024|2028|2030|2032/.test(t)) return false;

      const fullMatch = t.includes(first) && t.includes(last);

      const chamberWords = chamber === "senate"
        ? ["senate","senator"]
        : ["house","congress","congressional","representative","district","cd-"];
      const stateMatch   = state ? t.includes(state) : false;
      const chamberMatch = chamberWords.some(w => t.includes(w));
      const contextMatch = t.includes(last) && stateMatch && chamberMatch;

      return fullMatch || contextMatch;
    }

    const nameInfo = {};
    memberList.filter(m => m.antiArms).forEach(m => {
      nameInfo[m.name] = {state: (m.state||"").toLowerCase(), chamber: m.chamber||"house"};
    });
    racesList.forEach(r => {
      if (r.name) nameInfo[r.name] = {state: (r.state||"").toLowerCase(), chamber: r.chamber||"house"};
    });

    const missing = Object.keys(nameInfo).filter(n => !existingPoly[n]);
    if (missing.length === 0) return {};

    const catalog = {};  // full_name → market (not last name!)
    const catalogQueries = ["2026 congressional", "2026 senate", "2026 house", "midterm 2026"];
    for (const q of catalogQueries) {
      try {
        for (const ep of ["markets", "events"]) {
          const r = await fetch(GAMMA + "/" + ep + "?q=" + encodeURIComponent(q) + "&active=true&limit=50");
          if (!r.ok) continue;
          const data = await r.json();
          const items = Array.isArray(data) ? data : (data[ep] || data.data || data.markets || []);
          for (const item of items) {
            const markets = item.markets || [item];
            for (const mk of markets) {
              const title = mk.question || mk.title || "";
              for (const name of missing) {
                if (!catalog[name] && validateMarket(title, name, nameInfo[name])) {
                  catalog[name] = mk;
                }
              }
            }
          }
        }
      } catch {}
      await new Promise(r => setTimeout(r, 200));
    }

    const fresh = {};
    for (const name of missing) {
      const last  = name.split(" ").pop();
      const info  = nameInfo[name];
      let mk = catalog[name];  // full-name keyed, not last-name

      if (!mk) {
        const queries = [
          `"${name}" 2026`,
          `${name} 2026`,
          `${last} ${info.state||""} 2026`,
        ];
        for (const q of queries) {
          try {
            const r = await fetch(GAMMA + "/markets?q=" + encodeURIComponent(q) + "&limit=8");
            if (!r.ok) continue;
            const data = await r.json();
            const items = Array.isArray(data) ? data : (data.markets || []);
            mk = items.find(m => validateMarket(m.question || m.title || "", name, info));
            if (mk) break;
          } catch {}
          await new Promise(r => setTimeout(r, 250));
        }
      }

      if (!mk) continue;

      const {yes, no} = extractYesToken(mk);
      let prob = null, src = "polymarket_gamma";

      if (yes) {
        try {
          const r = await fetch(CLOB + "/midpoint?token_id=" + encodeURIComponent(yes));
          if (r.ok) {
            const d = await r.json();
            const mid = safeFloat(d.mid);
            if (mid !== null) { prob = mid; src = "polymarket_live"; }
          }
        } catch {}
      }

      if (prob === null) {
        const ltp = mk.lastTradePrice || mk.last_trade_price;
        if (ltp != null) { prob = safeFloat(ltp); }
        else {
          const op = mk.outcomePrices;
          if (op) {
            try {
              const arr = typeof op === "string" ? JSON.parse(op) : op;
              if (arr && arr.length > 0) prob = safeFloat(arr[0]);
            } catch {}
          }
        }
      }

      if (prob !== null && prob >= 0 && prob <= 1) {
        const slug = mk.slug || "";
        fresh[name] = {
          prob,
          src,
          question:     mk.question || mk.title || "",
          condition_id: mk.conditionId || "",
          token_id:     yes || "",
          no_token_id:  no  || "",
          slug,
          volume:       safeFloat(mk.volume) || 0,
          url:          slug ? "https://polymarket.com/event/" + slug : "https://polymarket.com",
          fetched_at:   new Date().toISOString(),
        };
      }
      await new Promise(r => setTimeout(r, 300));
    }

    if (Object.keys(fresh).length > 0) {
      console.log("Poly Gamma new: " + Object.keys(fresh).length + " candidates found");
    }
    return fresh;
  }

  async function refreshPoly(memberList, racesList, basePolyData) {
    setPolyLoad(true);
    try {
      const [batchFresh, piFresh] = await Promise.all([
        batchRefreshCLOB(basePolyData),
        refreshPredictIt(basePolyData),
      ]);

      const merged = {...basePolyData, ...batchFresh, ...piFresh};
      const newFresh = await searchGammaForNew(memberList, racesList, merged);

      const allFresh = {...batchFresh, ...piFresh, ...newFresh};
      if (Object.keys(allFresh).length > 0) {
        setPolyLive(prev => ({...prev, ...allFresh}));
        setPolyUpd(new Date().toISOString());
        const newTokens = Object.entries(newFresh).filter(([,v]) => v.token_id);
        if (newTokens.length > 0) {
          setPolyBase(prev => {
            const updated = {...prev};
            newTokens.forEach(([k,v]) => { updated[k] = v; });
            return updated;
          });
        }
      }
    } catch (e) {
      console.warn("refreshPoly error:", e);
    }
    setPolyLoad(false);
  }

  useEffect(() => {
    fetch(HISTORY_URL + "?_=" + Date.now()).then(r => r.json()).then(d => {
      if (d.events) setHistory(d);
    }).catch(() => {});

    (async () => {
      try {
        const r = await fetch(DATA_URL + "?_=" + Date.now());
        if (!r.ok) throw new Error("HTTP " + r.status);
        const d = await r.json();

        let memberList = d.members || [];
        if (memberList.length === 0 && d.trackaipac_congress) {
          memberList = Object.values(d.trackaipac_congress)
            .filter(m => m.name && m.name.toLowerCase() !== "vacant" && m.name.length > 2)
            .map(m => ({
              bioguide_id: "", name: m.name, party: m.party || "?",
              state: m.state || "", district: m.district != null ? m.district : null,
              chamber: m.chamber || "house",
              antiArms: !!(m.antiArms || m.approved),
              antiArmsLevel: null,
              ps: "INCUMBENT", bills: [], votes: [],
              lobby_total: m.lobby_total || 0, pacs: m.pacs || [], note: m.note || "",
            }));
        }
        // antiArms set by fetch_data.py pipeline (TrackAIPAC + RLC + clerk votes). No frontend overrides.
        memberList = memberList.map(m => ({
          ...m,
          note: (m.note||"").replace(/[-–—]?\s*classified soft\.?/gi,"").trim(),
        }));

        setMembers(memberList);
        setBills(d.bills || []);
        if (d.congress_history && Object.keys(d.congress_history).length > 0) {
          setCongressHistory(d.congress_history);
        }

        const taEndorsed  = (d.trackaipac_endorsed || []).map(c => ({
          ...c, ps: c.ps || "UPCOMING", chamber: c.chamber || "house",
        }));
        const rlcEndorsed = (d.rlc_endorsed || []).map(c => ({
          ...c, ps: c.ps || "UPCOMING", chamber: c.chamber || "house",
        }));
        const seenNames = new Set(taEndorsed.map(c => c.name));
        const raceChalls = (d.races_2026||[])
          .filter(r => r.type === "challenger")
          .map(r => ({
            name:       r.name,
            party:      r.party,
            state:      r.state,
            chamber:    r.chamber,
            ps:         r.primary_result === "WON" ? "WON" : (r.status==="pending_general"?"GENERAL":"UPCOMING"),
            primaryDate:r.primary_date,
            note:       r.note || "",
            antiArms:   true,
            source:     "races_2026",
          }));
        const raceNames = new Set(raceChalls.map(c => c.name));
        const allChalls = [
          ...taEndorsed,
          ...rlcEndorsed.filter(c => !seenNames.has(c.name)),
          ...raceChalls.filter(c => !seenNames.has(c.name) && !raceNames.has("_dup")),
        ];
        if (allChalls.length > 0) setChalls(allChalls);
        if (d.races_2026 && d.races_2026.length) setRaces(d.races_2026);
        if (d.fec && Object.keys(d.fec).length > 0) setFec(d.fec);

        const baseP = (d.poly && Object.keys(d.poly).length > 0) ? d.poly : {};
        setPolyBase(baseP);

        if (d.meta && d.meta.fetched_at) setFetchedAt(d.meta.fetched_at);
        const anti  = memberList.filter(m => m.antiArms).length;
        const age   = (d.meta && d.meta.fetched_at)
          ? Math.round((Date.now() - new Date(d.meta.fetched_at)) / 60000) : "?";
        setStatus("✓ " + anti + " anti-intervention · " + memberList.length + " members · " + age + "m ago");
        clearTimeout(window._aectLoadTimeout);

        const racesList = (d.races_2026 && d.races_2026.length) ? d.races_2026 : [];
        refreshPoly(memberList, racesList, baseP);

      } catch (e) {
        const msg = e && e.message ? e.message : String(e);
        setStatus("⚠ " + msg + " — Check GitHub Actions has run and data.json exists.");
        console.error("data.json load error:", e);
        setLoaded(true);   // always unblock render even on error
        return;
      }
      setLoaded(true);
    })().catch(e => {
      console.error("useData IIFE rejected:", e);
      setStatus("⚠ Unexpected load error: " + (e && e.message ? e.message : e));
      setLoaded(true);
    });

    const _loadTimeout = setTimeout(() => {
      setLoaded(true);
      setStatus("⚠ Timed out loading data.json. Check GitHub Actions.");
    }, 10000);
    window._aectLoadTimeout = _loadTimeout;

    try {
      const gun  = Gun({peers: GUN_PEERS, localStorage: false});
      const node = gun.get("aect-tracker-v1");
      node.get("fec").on(d => {
        if (d) {
          const c = Object.fromEntries(Object.entries(d).filter(([k]) => k !== "_"));
          if (Object.keys(c).length > 0) setFec(c);
        }
      });
    } catch (e) { console.warn("Gun.js:", e); }
  }, []);

  useEffect(() => {
    if (allMembers.length === 0) return;
    const id = setInterval(async () => {
      const [bFresh, pFresh] = await Promise.all([
        batchRefreshCLOB(polyBase),
        refreshPredictIt(polyBase),
      ]);
      const combined = {...bFresh, ...pFresh};
      if (Object.keys(combined).length > 0) {
        setPolyLive(prev => ({...prev, ...combined}));
        setPolyUpd(new Date().toISOString());
      }
    }, 5 * 60 * 1000);
    return () => clearInterval(id);
  }, [allMembers.length, polyBase]);

  const mergedPoly = {};
  const allPolyKeys = new Set([...Object.keys(polyBase), ...Object.keys(polyLive)]);
  for (const k of allPolyKeys) {
    mergedPoly[k] = polyLive[k] || polyBase[k];
  }

  const descriptions = (typeof window !== "undefined" && window._appData && window._appData.descriptions) || {};
  return {
    allMembers, bills, challengers, history, races, congressHistory, fecData,
    polyData:    mergedPoly,
    polyLive,
    polyUpdated: polyUpdated,
    polyLoading,
    fetchedAt,   status, loaded,
    descriptions,
  };
}

function CandidateTimeline({allMembers, challengers, racesData, polyData, descriptions}) {
  descriptions = (descriptions && typeof descriptions === 'object') ? descriptions : {};
  const [filter, setFilter] = useState("all");

  const today = new Date(); today.setHours(0,0,0,0);

  function parseDate(s) {
    if (!s) return null;
    const d = new Date(s + "T12:00:00");
    return isNaN(d) ? null : d;
  }
  function fmtDate(d) {
    if (!d) return "";
    return d.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  }

  const allCands = [];
  const seen = new Set();

  function normName(n) {
    return (n||"").replace(/^(congressman|senator|representative)\s+/i,"").trim().toLowerCase();
  }
  function addCand(c) {
    const key = normName(c.name);
    if (seen.has(key)) {
      const ex = allCands.find(x => x._key === key);
      if (ex) {
        if (c.primary_date && !ex.primary_date)   ex.primary_date   = c.primary_date;
        if (c.general_date && !ex.general_date)   ex.general_date   = c.general_date;
        if (c.primary_result && !ex.primary_result) ex.primary_result = c.primary_result;
        if (c.win_prob != null && ex.win_prob == null) ex.win_prob   = c.win_prob;
        if (c.primary_pct && !ex.primary_pct)     ex.primary_pct    = c.primary_pct;
        if (c.general_opponent && !ex.general_opponent) ex.general_opponent = c.general_opponent;
        if (c.primary_opponent && !ex.primary_opponent) ex.primary_opponent = c.primary_opponent;
        if (c.note && !ex.note)                   ex.note           = c.note;
        if (c.win_prob_src && !ex.win_prob_src)   ex.win_prob_src   = c.win_prob_src;
      }
      return;
    }
    seen.add(key);
    allCands.push({...c, _key: key,
      name: c.name.replace(/^(congressman|senator|representative)\s+/i,"").trim()});
  }

  (racesData || []).filter(r => r.type === "challenger" || r.primary_result).forEach(r => {
    addCand({
      name: r.name, party: r.party||"D", state: r.state||"", district: r.district,
      chamber: r.chamber||"house",
      primary_date: r.primary_date||"", general_date: r.general_date||"",
      primary_result: r.primary_result||"", primary_pct: r.primary_pct,
      primary_opponent: r.primary_opponent||"", general_opponent: r.general_opponent||"",
      win_prob: r.win_prob != null ? r.win_prob : null,
      win_prob_src: r.win_prob_src||"",
      note: r.note||"", source: "tracked",
    });
  });

  (challengers || []).forEach(c => {
    const wonOrGen = c.ps === "WON" || c.ps === "GENERAL" || c.primary_result === "WON";
    addCand({
      name: c.name, party: c.party||"D",
      state: c.state||"", district: c.district,
      chamber: c.chamber||"house",
      primary_date: c.primaryDate || c.primary_date || "",
      general_date: c.general_date || (c.ps === "GENERAL" ? "2026-11-03" : ""),
      primary_result: wonOrGen ? "WON" : "",
      primary_pct: null, primary_opponent: "", general_opponent: "",
      win_prob: null, win_prob_src: "",
      note: c.note||"",
      source: c.source === "rlc_endorsed" ? "rlc" : "trackaipac",
    });
  });

  // Add anti-establishment INCUMBENTS who are actively running
  (allMembers||[]).filter(m =>
    m.antiArms &&
    !["RETIRED","RESIGNED","DEFEATED","RETIRING","FLIPPED"].includes(m.ps)
  ).forEach(m => {
    const race = (racesData||[]).find(r => r.name === m.name);
    addCand({
      name:             m.name,
      party:            m.party || "?",
      state:            m.state || "",
      district:         m.district,
      chamber:          m.chamber || "house",
      primary_date:     race?.primary_date || "",
      general_date:     race?.general_date || "2026-11-03",
      primary_result:   race?.primary_result || "",
      primary_pct:      race?.primary_pct || null,
      primary_opponent: race?.primary_opponent || "",
      general_opponent: race?.general_opponent || "",
      win_prob:         race?.win_prob ?? null,
      win_prob_src:     race?.win_prob_src || "",
      cook_rating:      race?.cook_rating || "",
      note:             race?.note || m.note || "",
      source:           "incumbent",
      ps:               m.ps,
    });
  });

  allCands.forEach(c => {
    const pd = getValidatedPoly(c, polyData);
    if (pd && pd.prob != null) {
      c.win_prob     = pd.prob;
      c.win_prob_src = pd.src || "polymarket";
      c.forecast_url = pd.url || "";
      if (pd.src === "grok_estimate" && pd.question && !c.win_prob_reasoning) {
        c.win_prob_reasoning = pd.question;
      }
    }
    const desc = descriptions && (descriptions[c.name] || descriptions[normName(c.name)]);
    if (desc && !c.description) c.description = desc;
  });

  function getStatus(c) {
    const pd = parseDate(c.primary_date);
    const gd = parseDate(c.general_date);
    const won = c.primary_result === "WON";

    if (won || c.ps === "GENERAL") {
      if (!gd) return {tag:"WON PRIMARY",      sub:"general date TBD",       color:"#4ade80", phase:"general"};
      const diff = Math.ceil((gd - today) / 86400000);
      if (diff < -3) return {tag:"GENERAL PENDING", sub:"results awaited "+fmtDate(gd), color:"#fbbf24", phase:"general"};
      if (diff < 0)  return {tag:"RECOUNT WINDOW",  sub:fmtDate(gd),                  color:"#f97316", phase:"general"};
      if (diff === 0)return {tag:"VOTING TODAY",     sub:"general election",            color:"#4ade80", phase:"general"};
      if (diff <= 14)return {tag:"GENERAL SOON",     sub:fmtDate(gd),                  color:"#4ade80", phase:"general"};
      return               {tag:"WON PRIMARY",       sub:"general "+fmtDate(gd),        color:"#4ade80", phase:"general"};
    }
    if (!pd)    return     {tag:"UPCOMING",          sub:"date TBD",                    color:"#4b5563", phase:"primary"};
    const diff = Math.ceil((pd - today) / 86400000);
    if (diff < -10) return {tag:"PENDING RESULTS",   sub:"primary "+fmtDate(pd),        color:"#f59e0b", phase:"primary"};
    if (diff < -1)  return {tag:"RUNOFF WINDOW",     sub:"primary "+fmtDate(pd),        color:"#f97316", phase:"primary"};
    if (diff < 0)   return {tag:"RESULTS TODAY",     sub:fmtDate(pd),                   color:"#4ade80", phase:"primary"};
    if (diff === 0) return {tag:"VOTING TODAY",      sub:"primary",                      color:"#4ade80", phase:"primary"};
    if (diff <= 7)  return {tag:"THIS WEEK",         sub:fmtDate(pd),                   color:"#a78bfa", phase:"primary"};
    if (diff <= 30) return {tag:"PRIMARY SOON",      sub:fmtDate(pd),                   color:"#818cf8", phase:"primary"};
    return               {tag:"UPCOMING PRIMARY",    sub:fmtDate(pd),                   color:"#4b5563", phase:"primary"};
  }

  function nextDate(c) {
    const won = c.primary_result === "WON" || c.ps === "GENERAL";
    const d = won ? parseDate(c.general_date)||parseDate(c.primary_date)
                  : parseDate(c.primary_date);
    return d ? d.getTime() : 9e15;
  }

  const filters = [
    {k:"all",     label:"All"},
    {k:"soon",    label:"< 30 days"},
    {k:"general", label:"In general"},
    {k:"pending", label:"Pending"},
    {k:"R",       label:"R candidates"},
    {k:"D",       label:"D candidates"},
  ];

  const sorted = [...allCands].sort((a,b) => nextDate(a)-nextDate(b));

  const displayed = sorted.filter(c => {
    if (filter === "R") return c.party === "R";
    if (filter === "D") return c.party !== "R";
    if (filter === "general") return c.primary_result === "WON" || c.ps === "GENERAL";
    if (filter === "pending") {
      const t = getStatus(c).tag;
      return t.includes("PENDING") || t.includes("RUNOFF") || t.includes("RESULTS");
    }
    if (filter === "soon") {
      const won = c.primary_result === "WON" || c.ps === "GENERAL";
      const d = won ? parseDate(c.general_date) : parseDate(c.primary_date);
      if (!d) return false;
      return Math.ceil((d-today)/86400000) <= 30;
    }
    return true;
  });

  function monthKey(c) {
    const won = c.primary_result === "WON" || c.ps === "GENERAL";
    const d = won ? parseDate(c.general_date)||parseDate(c.primary_date) : parseDate(c.primary_date);
    return d ? d.toLocaleDateString("en-US",{month:"long",year:"numeric"}) : "Date TBD";
  }

  const groups = [];
  displayed.forEach(c => {
    const mk = monthKey(c);
    let g = groups.find(x => x.key===mk);
    if (!g) { g = {key:mk, cands:[]}; groups.push(g); }
    g.cands.push(c);
  });

  function WinGauge({prob, src}) {
    if (prob == null) return null;
    const pct = Math.round(prob*100);
    const col = prob>=0.6 ? "#4ade80" : prob>=0.35 ? "#fbbf24" : "#f87171";
    const r=16, circ=Math.PI*r, dash=Math.min(1,prob)*circ;
    const w=44, h=24;
    const srcLabel = src==="polymarket_live" || src==="polymarket_gamma" || src==="polymarket"
      ? html`<span style=${{fontSize:6,color:"#4ade80",fontFamily:FM,lineHeight:1}}>◉ Poly</span>`
      : src==="predictit_contract"
      ? html`<span style=${{fontSize:6,color:"#f59e0b",fontFamily:FM,lineHeight:1}}>◈ PI</span>`
      : src==="predictit_party"
      ? html`<span style=${{fontSize:6,color:"#6b7280",fontFamily:FM,lineHeight:1}}>◇ PI~</span>`
      : src==="metaculus"
      ? html`<span style=${{fontSize:6,color:"#a78bfa",fontFamily:FM,lineHeight:1}}>△ Meta</span>`
      : src==="grok_estimate"
      ? html`<span style=${{fontSize:6,color:"#38bdf8",fontFamily:FM,lineHeight:1}}>✦ Grok</span>`
      : null;
    return html`
      <div style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:1,width:44}}>
        <svg width=${w} height=${h} viewBox=${"0 0 "+w+" "+h}>
          <path d=${"M 6 "+(h-2)+" A "+r+" "+r+" 0 0 1 "+(w-6)+" "+(h-2)}
            fill="none" stroke="#1e2230" stroke-width="4" stroke-linecap="round"/>
          <path d=${"M 6 "+(h-2)+" A "+r+" "+r+" 0 0 1 "+(w-6)+" "+(h-2)}
            fill="none" stroke=${col} stroke-width="4" stroke-linecap="round"
            stroke-dasharray=${dash+" "+circ}/>
          <text x=${w/2} y=${h-5} text-anchor="middle" font-size="8"
            font-family="monospace" fill=${col} font-weight="700">${pct}%</text>
        </svg>
        ${srcLabel}
      </div>`;
  }

  function CandRow({c}) {
    const [exp, setExp] = useState(false);
    const st = getStatus(c);
    const pc = c.party==="R" ? "#ef4444" : c.party==="D" ? "#60a5fa" : "#a3e635";
    const loc = c.district
      ? c.state+"-"+(c.chamber==="senate"?"Sen":c.district)
      : c.state+(c.chamber==="senate"?" Senate":"");
    const won = c.primary_result==="WON" || c.ps==="GENERAL";
    const opp = won ? c.general_opponent : c.primary_opponent;
    const srcLabel = c.source==="rlc" ? "RLC" : c.source==="tracked" ? "Tracked" : c.source==="incumbent" ? "Incumbent" : "TrackAIPAC";

    return html`
      <div style=${{borderBottom:"1px solid #0d1018"}}>
        <div onClick=${()=>setExp(v=>!v)} style=${{
          display:"flex", alignItems:"center", gap:8,
          padding:"7px 10px", cursor:"pointer",
          borderLeft:"3px solid "+st.color+(exp?"90":"40"),
          background: exp?"#0a0c10":"transparent",
        }}>
          <div title=${c.win_prob_reasoning || c.win_prob_src || ""}>
            <${WinGauge} prob=${c.win_prob} src=${c.win_prob_src}/>
          </div>
          ${c.win_prob == null ? html`<div style=${{width:44,flexShrink:0,textAlign:"center",fontSize:7,color:"#374151",fontFamily:FM,lineHeight:1.2}}>no %<br/>data</div>` : null}

          <div style=${{flex:"0 0 148px",minWidth:0}}>
            <div style=${{fontSize:10,fontWeight:700,color:"#f0ebe0",fontFamily:FM,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>${c.name}</div>
            <div style=${{fontSize:7,color:pc,fontFamily:FM,marginTop:1}}>
              ${c.party} · ${loc||"?"}
              <span style=${{color:"#374151",marginLeft:4}}>${srcLabel}</span>
            </div>
          </div>

          <div style=${{flex:1,minWidth:0}}>
            <div style=${{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
              <span style=${{fontSize:7,fontFamily:FM,padding:"1px 6px",borderRadius:3,
                background:st.color+"18",color:st.color,border:"1px solid "+st.color+"40",
                whiteSpace:"nowrap",letterSpacing:"0.05em"}}>${st.tag}</span>
              ${won && c.primary_pct ? html`
                <span style=${{fontSize:7,color:"#4ade80",fontFamily:FM}}>won ${c.primary_pct}%</span>` : null}
            </div>
            <div style=${{fontSize:7,color:"#4b5563",fontFamily:FM,marginTop:2,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              ${st.sub}${opp ? " · vs "+opp.slice(0,32)+(opp.length>32?"…":"") : ""}
            </div>
          </div>

          <span style=${{color:"#374151",fontSize:9,flexShrink:0}}>${exp?"▴":"▾"}</span>
        </div>
        ${exp && html`
          <div style=${{padding:"6px 12px 8px 63px",background:"#0a0c10",
            borderLeft:"3px solid "+st.color+"20",
            fontSize:8,color:"#6b7280",fontFamily:FM,lineHeight:1.6}}>
            ${c.description ? html`<div style=${{color:"#9ca3af",fontStyle:"italic",marginBottom:4}}>${c.description}</div>` : null}
            ${c.note||"No additional detail available."}
            ${c.website ? html`<br/><a href=${c.website} target="_blank"
              style=${{color:"#4b5563",textDecoration:"none"}}>→ campaign site</a>` : null}
          </div>`}
      </div>`;
  }

  const wonCount  = allCands.filter(c => c.primary_result==="WON"||c.ps==="GENERAL").length;
  const liveCount = allCands.filter(c => c.win_prob != null && c.win_prob_src).length;

  return html`
    <div style=${_SP}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",
        marginBottom:8,flexWrap:"wrap",gap:6}}>
        <div>
          <div style=${{fontSize:11,fontWeight:700,color:"#f0ebe0",fontFamily:FM}}>
            2026 Anti-Intervention Candidates
          </div>
          <div style=${{fontSize:8,color:"#4b5563",fontFamily:FM,marginTop:1}}>
            ${allCands.length} candidates · ${wonCount} in/past primary · ${allCands.length-wonCount} upcoming
            ${liveCount>0 ? html` · <span style=${{color:"#4ade80"}}>◉ ${liveCount} live odds</span>` : null}
          </div>
        </div>
        <div style=${{display:"flex",gap:4,flexWrap:"wrap"}}>
          ${filters.map(f => html`
            <button key=${f.k} onClick=${e=>{e.stopPropagation();setFilter(f.k)}}
              style=${{padding:"2px 7px",borderRadius:4,cursor:"pointer",
                border:"1px solid #1e2230",fontFamily:FM,fontSize:7,
                background:filter===f.k?"#1e2230":"transparent",
                color:filter===f.k?"#a5b4fc":"#4b5563"}}>
              ${f.label}
            </button>`)}
        </div>
      </div>

      <div style=${{background:"#0f1117",border:"1px solid #1a1d27",borderRadius:11,overflow:"hidden"}}>
        ${groups.length===0
          ? html`<div style=${{padding:"18px",textAlign:"center",color:"#374151",fontFamily:FM,fontSize:8}}>
              No candidates match this filter.</div>`
          : groups.map(g => html`
            <div key=${g.key}>
              <div style=${{padding:"4px 10px",background:"#090b0e",fontSize:7,
                color:"#374151",fontFamily:FM,letterSpacing:"0.12em",
                textTransform:"uppercase",borderBottom:"1px solid #0d1018"}}>
                ${g.key}
                <span style=${{color:"#1e2230",marginLeft:5}}>${g.cands.length} candidate${g.cands.length!==1?"s":""}</span>
              </div>
              ${g.cands.map(c => html`<${CandRow} key=${c.name+c.state} c=${c}/>`)}
            </div>`)}
      </div>

      <div style=${{marginTop:6,fontSize:7,color:"#374151",fontFamily:FM,lineHeight:1.7}}>
        ◉ Poly = Polymarket · ◈ PI = PredictIt · ◇ PI~ = PredictIt proxy · △ Meta = Metaculus · ✦ Grok = Grok web estimate · no % data = no forecast found · TrackAIPAC/RLC = endorsing orgs
      </div>
    </div>`;
}

function App() {
  const [chamber,  setChamber]  = useState("house");
  const [selected, setSelected] = useState(null);
  const [hovered,  setHovered]  = useState(null);
  const [showAnti, setShowAnti] = useState(false);
  const [showTimeline, setShowTimeline] = useState(false);

  const {allMembers, bills, challengers, history, races, congressHistory, fecData, polyData, polyLive, polyUpdated, polyLoading, fetchedAt, status, loaded, descriptions} = useData();

  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    if (p.get("chamber")==="senate") setChamber("senate");
    const mName = p.get("member");
    if (mName) setSelected(mName);
  }, []);

  useEffect(() => {
    const p = new URLSearchParams();
    if (chamber!=="house") p.set("chamber",chamber);
    if (selected) p.set("member",selected);
    const qs=p.toString();
    window.history.replaceState(null,"",qs?"?"+qs:window.location.pathname);
  }, [selected, chamber]);

  const svgW=610, svgH=300, cx=svgW/2, cy=svgH-14;
  const positions = useMemo(()=>computeHemicycle(allMembers,chamber,cx,cy),
    [allMembers, chamber, cx, cy]);

  const dotR      = chamber==="house" ? 4 : 6;
  const ch        = chamber==="house" ? "house" : "senate";
  const chMem     = allMembers.filter(m => m.chamber === ch);
  const selMember = selected ? allMembers.find(m => m.name === selected) : null;
  const sideR     = allMembers.filter(m=>m.antiArms&&m.party==="R"&&m.chamber===ch);
  const sideD     = allMembers.filter(m=>m.antiArms&&m.party!=="R"&&m.chamber===ch);
  const challR    = challengers.filter(c=>c.party==="R"&&c.chamber===ch);
  const challD    = challengers.filter(c=>c.party!=="R"&&c.chamber===ch);

  if (!loaded) return html`
    <div style=${{minHeight:"100vh",background:"#0a0c10",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style=${{textAlign:"center",fontFamily:FM,color:"#374151",fontSize:10}}>
        <div style=${{fontSize:22,marginBottom:10,opacity:.2}}>◈</div>
        ${status}
      </div>
    </div>`;

  if (loaded && allMembers.length===0) return html`
    <div style=${{minHeight:"100vh",background:"#0a0c10",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style=${{textAlign:"center",fontFamily:FM,maxWidth:420}}>
        <div style=${{fontSize:22,marginBottom:10,opacity:.2}}>◈</div>
        <div style=${{color:"#fbbf24",marginBottom:8,fontSize:11}}>data.json loaded but contains no members yet.</div>
        <div style=${{color:"#374151",fontSize:9,lineHeight:1.8}}>
          Go to your GitHub repo → Actions → Refresh Data → Run workflow.<br/>
          The first run populates member data from TrackAIPAC. It takes ~2 minutes.
        </div>
        <button onClick=${()=>window.location.reload()}
          style=${{marginTop:14,padding:"6px 16px",borderRadius:7,border:"none",
            background:"#fbbf24",color:"#0a0c10",fontFamily:FM,fontSize:10,
            fontWeight:700,cursor:"pointer"}}>
          Reload page
        </button>
      </div>
    </div>`;

  return html`
    <div style=${{minHeight:"100vh",background:"#0a0c10",display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 10px"}}>

      <div style=${{textAlign:"center",marginBottom:10}}>
        <div style=${{fontSize:8,letterSpacing:"0.22em",textTransform:"uppercase",color:"#374151",fontFamily:FM,marginBottom:3}}>
          ANTI-ESTABLISHMENT CONGRESSIONAL TRACKER
        </div>
        <h1 style=${{fontSize:19,fontWeight:700,margin:"0 0 2px",letterSpacing:"-0.02em",color:"#f0ebe0"}}>
          Anti-Establishment Congressional Tracker
        </h1>
        <div style=${{fontSize:9,color:"#6b7280",display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",alignItems:"center"}}>
          <span style=${{fontFamily:FM,color:"#6b7280",fontSize:8}}>${status}</span>
          ${polyLoading ? html`<span style=${{fontFamily:FM,color:"#4ade80",fontSize:8}}>◉ fetching live odds…</span>` : null}
          ${!polyLoading && polyUpdated ? html`
            <span style=${{fontFamily:FM,color:"#4ade80",fontSize:8,opacity:0.7}}
              title=${"Polymarket live — " + Object.keys(polyLive||{}).length + " markets refreshed " + new Date(polyUpdated).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}>
              · ◉ ${Object.keys(polyLive||{}).length} live odds · ${new Date(polyUpdated).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}
            </span>` : html`<span style=${{fontFamily:FM,color:"#374151",fontSize:8}}>◎ odds from cache</span>`}
          ${fetchedAt?html`<span style=${{fontFamily:FM,color:"#374151",fontSize:8}}>
            · ${new Date(fetchedAt).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
          </span>`:null}
        </div>
      </div>

      <!-- Chamber toggle -->
      <div style=${{display:"flex",gap:2,background:"#161920",borderRadius:10,padding:3,marginBottom:9,border:"1px solid #1e2230"}}>
        ${["house","senate"].map(c=>html`
          <button key=${c} onClick=${()=>{setChamber(c);setSelected(null);setShowTimeline(false);}}
            style=${{padding:"5px 15px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:FM,fontSize:10,
              letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,
              background:chamber===c?"#f0ebe0":"transparent",color:chamber===c?"#0a0c10":"#6b7280"}}>
            ${c==="senate"?"Senate · 100":"House · 435"}
          </button>`)}
        <button onClick=${()=>setShowTimeline(v=>!v)}
          style=${{padding:"5px 15px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:FM,fontSize:10,
            letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,
            background:showTimeline?"#1a0a2e":"transparent",
            color:showTimeline?"#a5b4fc":"#6b7280",
            borderLeft:"1px solid #1e2230"}}>
          📈 Timeline
        </button>
      </div>

      <!-- Legend + stat pills -->
      <div style=${{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",marginBottom:7}}>
        ${[
          {c:"#991b1b", bg:"rgba(153,27,27,.1)",  l:"Rep",            n:chMem.filter(m=>m.party==="R"&&!m.antiArms).length},
          {c:"#e879f9", bg:"rgba(232,121,249,.1)", l:"Anti-Intv. R",  n:chMem.filter(m=>m.antiArms&&m.party==="R").length},
          {c:"#818cf8", bg:"rgba(129,140,248,.1)", l:"Anti-Intv. D",  n:chMem.filter(m=>m.antiArms&&m.party!=="R").length},
          {c:"#1e40af", bg:"rgba(30,64,175,.1)",   l:"Dem",           n:chMem.filter(m=>m.party==="D"&&!m.antiArms).length},
        ].map(b=>html`
          <span key=${b.l} style=${{display:"inline-flex",alignItems:"center",gap:4,background:b.bg,border:"1px solid "+b.c+"30",borderRadius:5,padding:"2px 7px",fontSize:9,fontFamily:FM,color:b.c}}>
            <span style=${{width:5,height:5,borderRadius:"50%",background:b.c,display:"inline-block"}}/>
            ${b.l+" "+b.n}
          </span>`)}
        <button onClick=${()=>setShowAnti(v=>!v)}
          style=${{padding:"2px 7px",borderRadius:5,border:"1px solid #7c3aed33",background:showAnti?"#7c3aed1a":"transparent",color:showAnti?"#c084fc":"#4b5563",fontFamily:FM,fontSize:9,cursor:"pointer"}}>
          ${showAnti?"Show all":"Highlight anti-intervention"}
        </button>

      </div>

      <!-- Three columns / Timeline toggle -->
      ${showTimeline ? html`
        <div style=${{width:"100%",maxWidth:860,display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
          <${CandidateTimeline} allMembers=${allMembers} challengers=${challengers} polyData=${polyData} racesData=${races} descriptions=${descriptions || {}}/>
        </div>`
      : html`
      <div class="three-col" style=${{display:"flex",gap:10,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"center",width:"100%",maxWidth:1080}}>

        <${MemberBox} title="Anti-Intervention Republicans" color="#a855f7"
          members=${sideR} challengers=${challR} racesData=${races}
          fecData=${fecData} polyData=${polyData}
          onSelect=${m=>setSelected(m.name===selected?null:m.name)}/>

        <div class="ctr-col" style=${{display:"flex",flexDirection:"column",gap:7,alignItems:"center",flex:1,minWidth:0}}>

          <!-- Hemicycle SVG -->
          <div style=${{background:"#0f1117",border:"1px solid #1a1d27",borderRadius:13,overflow:"hidden",width:"100%",maxWidth:610}}>
            <svg class="hemi" width=${svgW} height=${svgH} viewBox=${"0 0 "+svgW+" "+svgH} style=${{display:"block",width:"100%",height:"auto"}}>
              ${Array.from({length:chamber==="senate"?4:9},(_,i)=>(chamber==="senate"?80:52)+i*(chamber==="senate"?28:22)).map((r,i)=>
                html`<path key=${i} d=${"M "+(cx-r)+" "+cy+" A "+r+" "+r+" 0 0 1 "+(cx+r)+" "+cy} fill="none" stroke="#111419" stroke-width="1"/>`
              )}
              ${positions.map((pos,i)=>{
                if (!pos || pos._filler) return html`<circle key=${i} cx=${pos?pos._x:-999} cy=${pos?pos._y:-999} r=${dotR} fill="#111419" opacity=".4"/>`;
                const dimDot = showAnti && !pos.antiArms;
                const isSel  = selected === pos.name;
                const isHov  = hovered  === pos.name;
                const color  = dotColor(pos);
                const poly   = getValidatedPoly(pos, polyData, races);
                const atRisk = poly && poly.prob < 0.65 && pos.antiArms;
                const r      = isHov ? dotR+1.5 : dotR;
                return html`<g key=${i}>
                  ${isSel?html`<circle cx=${pos._x} cy=${pos._y} r=${dotR+5} fill="none" stroke=${color} stroke-width="1.5" opacity=".4"/>`:null}
                  ${pos.antiArms&&!dimDot?html`<circle cx=${pos._x} cy=${pos._y} r=${dotR+2.5} fill="none" stroke=${color} stroke-width=".8" opacity=".18"/>`:null}
                  ${atRisk?html`<circle cx=${pos._x} cy=${pos._y} r=${dotR+3} fill="none" stroke="#fbbf24" stroke-width="1" opacity=".4" stroke-dasharray="2,2"/>`:null}
                  <circle cx=${pos._x} cy=${pos._y} r=${r}
                    fill=${dimDot?"#111419":color} opacity=${dimDot?0.12:1}
                    stroke=${isSel?"#fff":"none"} stroke-width="1.5"
                    style=${{cursor:"pointer", transition:"r 0.1s"}}
                    onClick=${()=>{setSelected(selected===pos.name?null:pos.name);setHovered(pos.name);}}
                    onMouseEnter=${()=>setHovered(pos.name)}
                    onMouseLeave=${()=>setHovered(null)}
                    onTouchStart=${(e)=>{e.preventDefault();setHovered(pos.name);setSelected(selected===pos.name?null:pos.name);}}
                    onTouchEnd=${()=>setTimeout(()=>setHovered(null),1200)}/>
                  ${isHov?html`<g pointer-events='none'>
                    <rect x=${pos._x+7} y=${pos._y-10} width=${Math.min(pos.name.length*4.6+10,130)} height='13' rx='3'
                      fill='#0a0c10' opacity='0.94' stroke='#1e2230' stroke-width='0.5'/>
                    <text x=${pos._x+11} y=${pos._y-3.5} font-size='7' font-family='monospace'
                      fill='#e5e7eb' dominant-baseline='middle'>${pos.name}</text>
                  </g>`:null}
                </g>`;
              })}
              <line x1=${cx} y1=${cy} x2=${cx} y2=${cy-(chamber==="senate"?164:228)-20} stroke="#1e2230" stroke-width="1" stroke-dasharray="3,3"/>
              <rect x=${cx-10} y=${cy-(chamber==="senate"?164:228)-29} width="20" height="11" rx="3" fill="#0e1016" stroke="#1e2230" stroke-width="0.5"/>
              <text x=${cx} y=${cy-(chamber==="senate"?164:228)-23} font-size="6" font-family="monospace" fill="#4b5563" text-anchor="middle" dominant-baseline="middle">${chamber==="senate"?"51":"218"}</text>
              <text x=${cx-100} y="11" fill="#818cf8" font-size="6" font-family="monospace" text-anchor="middle" opacity=".8">Anti-D</text>
              <text x=${cx-45}  y="11" fill="#1e40af" font-size="7" font-family="monospace" text-anchor="middle" opacity=".5">D</text>
              <text x=${cx+45}  y="11" fill="#991b1b" font-size="7" font-family="monospace" text-anchor="middle" opacity=".5">R</text>
              <text x=${cx+100} y="11" fill="#e879f9" font-size="6" font-family="monospace" text-anchor="middle" opacity=".8">Anti-R</text>
              <ellipse cx=${cx} cy=${cy+6} rx="18" ry="6" fill="#0f1117"/>
              <rect x=${cx-3} y=${cy-7} width="6" height="13" fill="#0f1117" rx="2"/>
            </svg>
          </div>

          <!-- Detail panel -->
          <div style=${{width:"100%",maxWidth:610,background:"#0f1117",border:"1px solid #1a1d27",borderRadius:11,padding:"10px 13px",minHeight:70}}>
            <${DetailPanel} member=${selMember} fecData=${fecData} polyData=${polyData} bills=${bills} chamber=${chamber} races=${races}/>
          </div>

          <!-- Progress bars -->
          <div style=${_SP}>
            <${ProgressBars} chamber=${chamber} members=${chMem} allMembers=${allMembers} challengers=${challengers} racesData=${races} polyData=${polyData}/>
          </div>

          <!-- Legislation -->
          <div style=${_SP}>
            <${BillsPanel} bills=${bills}/>
          </div>

          <!-- History -->
          <div style=${_SP}>
            <${HistoryTimeline} history=${history}/>
          </div>

          <!-- Find My Rep -->
          <div style=${_SP}>
            <${FindMyRep} members=${chMem} onHighlight=${setSelected}/>
          </div>
        </div>

        <${MemberBox} title="Anti-Intervention Democrats" color="#7c3aed"
          members=${sideD} challengers=${challD} racesData=${races}
          fecData=${fecData} polyData=${polyData}
          onSelect=${m=>setSelected(m.name===selected?null:m.name)}/>

      </div>

      `}

      <div style=${{fontSize:8,color:"#1a1d27",marginTop:14,fontFamily:FM,textAlign:"center",maxWidth:800,lineHeight:1.8}}>
        MEMBERS: TRACKAIPAC.COM (D/I) + RLC LIBERTY INDEX (R) · VOTES: CONGRESS.GOV HOUSE-VOTE API + CLERK XML
        <br/>FINANCE: OPENFEC · ODDS: POLYMARKET · REPS: GOOGLE CIVIC · P2P: GUN.JS · REFRESH: 4H GITHUB ACTIONS
        <br/><a href="https://github.com/LukeRDavis/Anti-Establishment-Congressional-Tracker" target="_blank" style=${{color:"#374151"}}>github.com/LukeRDavis/Anti-Establishment-Congressional-Tracker</a>
      </div>
    </div>`;
}

render(html`<${App}/>`, document.getElementById("app"));

</script>
</body>
</html>
